\"gap-2-11\\\" onclick=\\\"showGapOptions(event, '2', '11')\\\">(11)</span> , helping you map out your academic and career goals. Whether you desire  <span class=\\\"gap-btn\\\" id=\\\"gap-2-12\\\" onclick=\\\"showGapOptions(event, '2', '12')\\\">(12)</span>  abroad, this workshop is your gateway to the global stage!<br></div></div><div class=\\\"section-box\\\"><h3 class=\\\"section-title\\\">Part 3: Sentence Rearrangement</h3><div style=\\\"margin-bottom:30px\\\"><strong>Question 13.</strong> Drag/Drop:<ul class=\\\"sortable-list\\\" id=\\\"sortable-13\\\"><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"c\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>c.</b> I would love to hear more about his younger years, especially how he overcame the challenges of poverty and war.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"a\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>a.</b> I believe his story could teach me a lot about resilience and strength.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"d\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>d.</b> Any memories or lessons you could share would mean a lot to me as I navigate my own path.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"e\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>e.</b> What values did he hold dear, and how did he view family, work, and life? With love,</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"b\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>b.</b> I hope you're both doing well, and I've been thinking a lot about Grandpa and his life lately.</li></ul><button class=\\\"action-btn btn-primary\\\" onclick=\\\"checkOrder('13', 'b,c,e,a,d')\\\">Check</button><span id=\\\"fb-13\\\" style=\\\"margin-left:10px\\\"></span><div id=\\\"ans-13\\\" style=\\\"display:none;color:#22c55e;margin-top:5px\\\">Correct: b - c - e - a - d</div></div><div style=\\\"margin-bottom:30px\\\"><strong>Question 14.</strong> Drag/Drop:<ul class=\\\"sortable-list\\\" id=\\\"sortable-14\\\"><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"b\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>b.</b> Overall, staying with a host family not only enriched my understanding of their way of life but also created lasting memories and friendships that I will always cherish.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"e\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>e.</b> Sharing meals together was one of the highlights, as I got to taste authentic homemade dishes while learning about their culture and traditions.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"d\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>d.</b> Living with locals also allowed me to improve my language skills quickly, as I had daily conversations and picked up phrases that textbooks could never teach.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"a\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>a.</b> From the moment I arrived, they welcomed me like a member of their own family, making me feel at home in a completely new environment.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"c\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>c.</b> Staying with a host family during my trip abroad was an unforgettable experience that gave me a unique opportunity to immerse myself in a new culture.</li></ul><button class=\\\"action-btn btn-primary\\\" onclick=\\\"checkOrder('14', 'c,a,e,d,b')\\\">Check</button><span id=\\\"fb-14\\\" style=\\\"margin-left:10px\\\"></span><div id=\\\"ans-14\\\" style=\\\"display:none;color:#22c55e;margin-top:5px\\\">Correct: c - a - e - d - b</div></div><div style=\\\"margin-bottom:30px\\\"><strong>Question 15.</strong> Drag/Drop:<ul class=\\\"sortable-list\\\" id=\\\"sortable-15\\\"><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"b\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>b.</b> Nowadays, more and more young people celebrate Western festivals in Viet Nam.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"d\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>d.</b> They give an opportunity for young people to relax and spend enjoyable time with their friends and family.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"c\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>c.</b> Taking part in celebrations can help young people learn more about other people's traditions and customs.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"f\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>f.</b> Secondly, festivals are special events that help bring fun, happiness and joy to young people's lives.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"e\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>e.</b> In conclusion, they can have fun, broaden their cultural knowledge and enjoy their school life more.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"a\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>a.</b> Firstly, festivals are a great way to understand a nation's culture.</li></ul><button class=\\\"action-btn btn-primary\\\" onclick=\\\"checkOrder('15', 'b,a,c,d,f,e')\\\">Check</button><span id=\\\"fb-15\\\" style=\\\"margin-left:10px\\\"></span><div id=\\\"ans-15\\\" style=\\\"display:none;color:#22c55e;margin-top:5px\\\">Correct: b - a - c - d - f - e</div></div><div style=\\\"margin-bottom:30px\\\"><strong>Question 16.</strong> Drag/Drop:<ul class=\\\"sortable-list\\\" id=\\\"sortable-16\\\"><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"b\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>b.</b> Anna: Hi John, I often think about my grandfather. He lived through so many hardships and still managed to build a good life for his family.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"d\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>d.</b> John: Wow, that's incredible. He must have been a strong and determined man.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"a\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>a.</b> Anna: Definitely! Despite facing poverty and war, he always valued hard work and family above all.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"c\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>c.</b> John: His story is truly inspiring. It shows the power of perseverance and love in overcoming challenges.</li></ul><button class=\\\"action-btn btn-primary\\\" onclick=\\\"checkOrder('16', 'b,c,a,d')\\\">Check</button><span id=\\\"fb-16\\\" style=\\\"margin-left:10px\\\"></span><div id=\\\"ans-16\\\" style=\\\"display:none;color:#22c55e;margin-top:5px\\\">Correct: b - c - a - d</div></div><div style=\\\"margin-bottom:30px\\\"><strong>Question 17.</strong> Drag/Drop:<ul class=\\\"sortable-list\\\" id=\\\"sortable-17\\\"><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"c\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>c.</b> Anna: He proved that thinking differently can change the world.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"a\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>a.</b> John: Hello Anna, yes, his vision and innovation truly revolutionized technology.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"b\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>b.</b> Anna: Hello John, Steve Jobs' life is so inspiring. He turned failure into one of the greatest successes.</li></ul><button class=\\\"action-btn btn-primary\\\" onclick=\\\"checkOrder('17', 'b,c,a')\\\">Check</button><span id=\\\"fb-17\\\" style=\\\"margin-left:10px\\\"></span><div id=\\\"ans-17\\\" style=\\\"display:none;color:#22c55e;margin-top:5px\\\">Correct: b - c - a</div></div></div><div class=\\\"section-box\\\"><h3 class=\\\"section-title\\\">Part 4: Gap Fill / Cloze Test</h3><div class=\\\"gap-fill-text\\\">Online shopping has become very popular among young people, especially on platforms like Shopee and TikTok.  <span class=\\\"gap-btn\\\" id=\\\"gap-4-18\\\" onclick=\\\"showGapOptions(event, '4', '18')\\\">(18)</span> . As online shopping is made easier,  <span class=\\\"gap-btn\\\" id=\\\"gap-4-19\\\" onclick=\\\"showGapOptions(event, '4', '19')\\\">(19)</span> . Young people  <span class=\\\"gap-btn\\\" id=\\\"gap-4-20\\\" onclick=\\\"showGapOptions(event, '4', '20')\\\">(20)</span>  find it convenient to shop from home. With just a few clicks, they can compare prices and choose items they like without going to a store. This way of shopping allows them to save time and money, making it more appealing to younger generations. Additionally, many of their purchases  <span class=\\\"gap-btn\\\" id=\\\"gap-4-21\\\" onclick=\\\"showGapOptions(event, '4', '21')\\\">(21)</span> . In addition to discounts, social media influencers now help young people shop online. Seeing their friends and influencers sharing product recommendations,  <span class=\\\"gap-btn\\\" id=\\\"gap-4-22\\\" onclick=\\\"showGapOptions(event, '4', '22')\\\">(22)</span> . They enjoy sharing their favorite finds with friends, creating a sense of community around their purchases. As online shopping continues to grow, it is clear that these platforms are changing how young people buy things today.<br></div></div><div class=\\\"section-box\\\">\\n                    <div class=\\\"section-header\\\">\\n                        <h3 class=\\\"section-title\\\">Part 5: Reading</h3>\\n                        <button class=\\\"fullscreen-btn\\\" onclick=\\\"toggleFullScreenReading(this)\\\">⛶ Full Screen</button>\\n                    </div>\\n                    <div class=\\\"reading-container\\\" id=\\\"reading-5\\\"><div class=\\\"reading-left\\\">Tourism has become one of the world's fastest-growing industries, with millions traveling annually to explore new destinations and cultures. However, the rapid <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('expansion')\\\">expansion</span> of mass tourism is increasingly under <b><span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('scrutiny')\\\">scrutiny</span></b> due to its impact on local communities and the environment. As tourism grows, it raises concerns about <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('sustainability')\\\">sustainability</span> and the long-term effects on the places and people being visited. Tourism has been identified as a significant <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('driver')\\\">driver</span> of environmental <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('degradation')\\\">degradation</span>, cultural erosion, and social <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('inequality')\\\">inequality</span> in certain regions.<br><br>One of the key concerns associated with tourism is its environmental impact. As more travelers visit popular destinations, local ecosystems are <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('strained')\\\">strained</span>. <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('deforestation')\\\">Deforestation</span>, pollution, and wildlife disruption are some of the consequences of <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('unmanaged')\\\">unmanaged</span> tourism. For example, in the Galápagos Islands and Bali, tourism has led to the destruction of <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('fragile')\\\">fragile</span> ecosystems, overfishing, and coral reef damage. Air travel, in particular, contributes to carbon emissions, <b>exacerbating</b> global warming and <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('disproportionately')\\\">disproportionately</span> affecting <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('vulnerable')\\\">vulnerable</span> regions.<br>In addition to environmental issues, tourism often leads to cultural shifts in local communities. While tourism can bring economic benefits, <b>it</b> can also result in the <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('commodification')\\\">commodification</span> of local cultures. Indigenous traditions may be <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('distorted')\\\">distorted</span> or abandoned to cater to tourist demands. <b>In some communities, sacred rituals are performed as spectacles for entertainment, undermining their authenticity and diminishing the cultural heritage in the eyes of locals</b>.<br><br>In conclusion, the negative impacts of tourism on the environment and local cultures could be <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('minimized')\\\">minimized</span> if governments, businesses, and travelers adopt more <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('sustainable')\\\">sustainable</span> practices. \\\"Eco-tourism\\\" promotes environmentally responsible travel, while \\\"slow tourism\\\" encourages deeper <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('engagement')\\\">engagement</span> with destinations and focuses on quality over quantity. By embracing these approaches, tourism can become a force for good, fostering both environmental <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('preservation')\\\">preservation</span> and cultural <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('appreciation')\\\">appreciation</span> for future generations.<br><br></div><div class=\\\"reading-right\\\"><div class=\\\"mcq-question\\\"><b>Question 23.</b> Which of the following is NOT mentioned as a consequence of unmanaged tourism?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q23\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '23', 'A')\\\"> A. Air pollution</label><label><input type=\\\"radio\\\" name=\\\"q23\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '23', 'B')\\\"> B. Deforestation</label><label><input type=\\\"radio\\\" name=\\\"q23\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '23', 'C')\\\"> C. Coral reef damage</label><label><input type=\\\"radio\\\" name=\\\"q23\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '23', 'D')\\\"> D. Soil erosion</label></div><div id=\\\"res-5-23\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 24.</b> The word “exacerbating” in paragraph 2 is OPPOSITE in meaning to ____________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q24\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '24', 'A')\\\"> A. aggravating</label><label><input type=\\\"radio\\\" name=\\\"q24\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '24', 'B')\\\"> B. worsening</label><label><input type=\\\"radio\\\" name=\\\"q24\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '24', 'C')\\\"> C. intensifying</label><label><input type=\\\"radio\\\" name=\\\"q24\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '24', 'D')\\\"> D. alleviating</label></div><div id=\\\"res-5-24\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 25.</b> The word “it” in paragraph 3 refers to ____________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q25\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '25', 'A')\\\"> A. communities</label><label><input type=\\\"radio\\\" name=\\\"q25\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '25', 'B')\\\"> B. tourism</label><label><input type=\\\"radio\\\" name=\\\"q25\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '25', 'C')\\\"> C. commodification</label><label><input type=\\\"radio\\\" name=\\\"q25\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '25', 'D')\\\"> D. benefits</label></div><div id=\\\"res-5-25\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 26.</b> The word “scrutiny” in paragraph 1 could be best replaced by ____________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q26\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '26', 'A')\\\"> A. negligence</label><label><input type=\\\"radio\\\" name=\\\"q26\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '26', 'B')\\\"> B. opposition</label><label><input type=\\\"radio\\\" name=\\\"q26\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '26', 'C')\\\"> C. examination</label><label><input type=\\\"radio\\\" name=\\\"q26\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '26', 'D')\\\"> D. disregard</label></div><div id=\\\"res-5-26\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 27.</b> Which of the following best paraphrases the underlined sentence in paragraph 3?\\n“In some communities, sacred rituals are performed as spectacles for entertainment, undermining their authenticity and diminishing the cultural heritage in the eyes of locals.”<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q27\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '27', 'A')\\\"> A. Turning sacred rituals into entertainment shows reduces their true meaning and cultural importance to locals.</label><label><input type=\\\"radio\\\" name=\\\"q27\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '27', 'B')\\\"> B. Sacred rituals are preserved and respected when performed for tourists.</label><label><input type=\\\"radio\\\" name=\\\"q27\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '27', 'C')\\\"> C. Rituals in some communities are done as entertainment, which harms their cultural value.</label><label><input type=\\\"radio\\\" name=\\\"q27\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '27', 'D')\\\"> D. Tourists' appreciation for sacred rituals increases their authenticity and cultural significance.</label></div><div id=\\\"res-5-27\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 28.</b> Which of the following is TRUE according to the passage?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q28\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '28', 'A')\\\"> A. Eco-tourism focuses on maximizing the number of tourists visiting a destination.</label><label><input type=\\\"radio\\\" name=\\\"q28\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '28', 'B')\\\"> B. Global warming is made worse by the substantial carbon emissions caused by air travel.</label><label><input type=\\\"radio\\\" name=\\\"q28\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '28', 'C')\\\"> C. Slow tourism encourages travelers to visit as many places as possible in a short time.</label><label><input type=\\\"radio\\\" name=\\\"q28\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '28', 'D')\\\"> D. Cultural shifts due to tourism always result in economic benefits for local communities.</label></div><div id=\\\"res-5-28\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 29.</b> In which paragraph does the writer mention a conditional relationship?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q29\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '29', 'A')\\\"> A. Paragraph 1</label><label><input type=\\\"radio\\\" name=\\\"q29\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '29', 'B')\\\"> B. Paragraph 2</label><label><input type=\\\"radio\\\" name=\\\"q29\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '29', 'C')\\\"> C. Paragraph 4</label><label><input type=\\\"radio\\\" name=\\\"q29\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '29', 'D')\\\"> D. Paragraph 3</label></div><div id=\\\"res-5-29\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 30.</b> In which paragraph does the writer discuss ways to address the negative impacts of tourism?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q30\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '30', 'A')\\\"> A. Paragraph 4</label><label><input type=\\\"radio\\\" name=\\\"q30\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '30', 'B')\\\"> B. Paragraph 1</label><label><input type=\\\"radio\\\" name=\\\"q30\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '30', 'C')\\\"> C. Paragraph 3</label><label><input type=\\\"radio\\\" name=\\\"q30\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '30', 'D')\\\"> D. Paragraph 2</label></div><div id=\\\"res-5-30\\\" style=\\\"margin-top:5px\\\"></div></div></div></div></div><div class=\\\"section-box\\\">\\n                    <div class=\\\"section-header\\\">\\n                        <h3 class=\\\"section-title\\\">Part 6: Reading</h3>\\n                        <button class=\\\"fullscreen-btn\\\" onclick=\\\"toggleFullScreenReading(this)\\\">⛶ Full Screen</button>\\n                    </div>\\n                    <div class=\\\"reading-container\\\" id=\\\"reading-6\\\"><div class=\\\"reading-left\\\"><b>[I]</b>. Domestic and school violence represent <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('persistent')\\\">persistent</span> and deeply concerning issues in Vietnam, often <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('concealed')\\\">concealed</span> beneath societal norms that prioritize family privacy and educational harmony. <b>[II].</b> Despite significant efforts by the government and various organizations to raise awareness and <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('implement')\\\">implement</span> protective measures, the <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('pervasive')\\\">pervasive</span> nature of these forms of violence continues to <b>inflict profound psychological and physical harm</b> on countless individuals, particularly the most <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('vulnerable')\\\">vulnerable</span>. <b>[III].</b> Understanding the nuances of these challenges is crucial for developing effective prevention and <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('intervention')\\\">intervention</span> strategies. <b>[IV].</b><br><br>Domestic violence, encompassing physical, emotional, sexual, and economic <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('abuse')\\\">abuse</span>, remains <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('alarmingly')\\\">alarmingly</span> prevalent. While laws are in place to protect <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('victims')\\\">victims</span>, cultural factors, such as the emphasis on maintaining family reputation and traditional gender roles, often deter <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('victims')\\\">victims</span> from speaking out or seeking help. Many instances occur behind closed doors, making them difficult to detect and address. Women and children are <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('disproportionately')\\\">disproportionately</span> affected, enduring long-term trauma that impacts <b>their</b> mental health, educational attainment, and future relationships. For example, a child witnessing or experiencing violence at home may develop anxiety, <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('depression')\\\">depression</span>, or behavioral problems, struggling to concentrate in school or form healthy social connections: <b>This cycle of violence can tragically perpetuate itself across generations if not broken</b>.<br><br>         School violence, too, presents a <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('multifaceted')\\\">multifaceted</span> problem, ranging from physical assaults and bullying to cyberbullying and emotional intimidation. The rise of social media and digital platforms has unfortunately provided new avenues for <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('harassment')\\\">harassment</span>, extending beyond the school gates. While bullying might seem like a minor issue to some, its impact on <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('victims')\\\">victims</span> can be <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('devastating')\\\">devastating</span>, leading to severe emotional <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('distress')\\\">distress</span>, declining academic performance, and even suicidal thoughts. A student constantly <b>ridiculed</b> or <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('ostracized')\\\">ostracized</span> by peers, for instance, might develop extreme shyness, <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('withdraw')\\\">withdraw</span> from social activities, or refuse to attend school altogether. Teachers and school authorities often face challenges in identifying and addressing these incidents due to <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('victims')\\\">victims</span>' <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('reluctance')\\\">reluctance</span> to report, fear of <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('retaliation')\\\">retaliation</span>, or inadequate training in handling complex social dynamics.<br><br>Addressing domestic and school violence requires a <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('comprehensive')\\\">comprehensive</span> and collaborative approach. Public awareness campaigns must challenge deep-seated cultural norms that <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('normalize')\\\">normalize</span> or excuse violence, encouraging <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('victims')\\\">victims</span> and witnesses to report incidents. Education plays a vital role, not only in teaching students about healthy relationships and conflict <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('resolution')\\\">resolution</span> but also in training teachers and parents to recognize signs of <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('abuse')\\\">abuse</span> and respond appropriately. Strengthening legal frameworks, improving access to support services (like hotlines, shelters, and counseling), and ensuring swift, effective <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('intervention')\\\">intervention</span> from authorities are also essential. Ultimately, fostering a society where safety, respect, and open communication are <span class=\\\"vocab-highlight\\\" onclick=\\\"showVocabDef('paramount')\\\">paramount</span> is key to dismantling these cycles of violence and protecting Vietnam's future generations.<br></div><div class=\\\"reading-right\\\"><div class=\\\"mcq-question\\\"><b>Question 31.</b> Where in paragraph 1 does the following sentence best fit?\\n\\n\\\"This silent suffering undermines the very fabric of family life and the learning environment.\\\"<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q31\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '31', 'A')\\\"> A. [I]</label><label><input type=\\\"radio\\\" name=\\\"q31\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '31', 'B')\\\"> B. [IV]</label><label><input type=\\\"radio\\\" name=\\\"q31\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '31', 'C')\\\"> C. [II]</label><label><input type=\\\"radio\\\" name=\\\"q31\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '31', 'D')\\\"> D. [III]</label></div><div id=\\\"res-6-31\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 32.</b> The phrase \\\"inflict profound psychological and physical harm\\\" in paragraph 1 could be best replaced by ____________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q32\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '32', 'A')\\\"> A. create deep intellectual and physical well-being</label><label><input type=\\\"radio\\\" name=\\\"q32\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '32', 'B')\\\"> B. bring about significant mental and bodily damage</label><label><input type=\\\"radio\\\" name=\\\"q32\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '32', 'C')\\\"> C. result in negligible emotional and physical pain</label><label><input type=\\\"radio\\\" name=\\\"q32\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '32', 'D')\\\"> D. cause minor emotional and bodily injury</label></div><div id=\\\"res-6-32\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 33.</b> The word \\\"their\\\" in paragraph 2 refers to ____________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q33\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '33', 'A')\\\"> A. women and children</label><label><input type=\\\"radio\\\" name=\\\"q33\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '33', 'B')\\\"> B. victims</label><label><input type=\\\"radio\\\" name=\\\"q33\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '33', 'C')\\\"> C. instances</label><label><input type=\\\"radio\\\" name=\\\"q33\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '33', 'D')\\\"> D. traditional gender roles</label></div><div id=\\\"res-6-33\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 34.</b> According to paragraph 2, which of the following is NOT a reason why victims of domestic violence might be deterred from seeking help?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q34\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '34', 'A')\\\"> A. Emphasis on maintaining family reputation</label><label><input type=\\\"radio\\\" name=\\\"q34\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '34', 'B')\\\"> B. Traditional gender roles</label><label><input type=\\\"radio\\\" name=\\\"q34\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '34', 'C')\\\"> C. Occurrence behind closed doors</label><label><input type=\\\"radio\\\" name=\\\"q34\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '34', 'D')\\\"> D. Absence of protective laws</label></div><div id=\\\"res-6-34\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 35.</b> Which of the following best summarizes paragraph 3?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q35\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '35', 'A')\\\"> A. School violence is a problem involving physical assaults among students and happening within the school gates.</label><label><input type=\\\"radio\\\" name=\\\"q35\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '35', 'B')\\\"> B. Cyberbullying leading to severe emotional distress, declining academic performance, and even suicidal thoughts is the most common form of violence.</label><label><input type=\\\"radio\\\" name=\\\"q35\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '35', 'C')\\\"> C. School violence is a complex issue, including various forms of abuse, worsened by digital platforms, with significant negative impacts on victims and challenges for school authorities to address.</label><label><input type=\\\"radio\\\" name=\\\"q35\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '35', 'D')\\\"> D. Teachers and school authorities are generally well-equipped to handle all types of school violence effectively.</label></div><div id=\\\"res-6-35\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 36.</b> The word \\\"ridiculed\\\" in paragraph 3 is OPPOSITE in meaning to ____________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '36', 'A')\\\"> A. insulted</label><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '36', 'B')\\\"> B. scorned</label><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '36', 'C')\\\"> C. mocked</label><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '36', 'D')\\\"> D. extolled</label></div><div id=\\\"res-6-36\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 37.</b> Which of the following is TRUE according to the passage?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '37', 'A')\\\"> A. Both domestic and school violence often remain hidden due to societal norms.</label><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '37', 'B')\\\"> B. The rise of social media has helped reduce instances of school bullying.</label><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '37', 'C')\\\"> C. Domestic violence primarily affects men in Vietnamese society.</label><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '37', 'D')\\\"> D. Current laws in Vietnam are fully effective in protecting all victims of violence.</label></div><div id=\\\"res-6-37\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 38.</b> Which of the following best paraphrases the underlined sentence in paragraph 2?\\n“This cycle of violence can tragically perpetuate itself across generations if not broken.”<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '38', 'A')\\\"> A. Breaking the cycle of violence is impossible once it has begun in a family.</label><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '38', 'B')\\\"> B. The patterns of abuse can sadly continue from one generation to the next unless there is intervention.</label><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '38', 'C')\\\"> C. Experiencing violence at home leads to a guaranteed cycle of violence in future generations.</label><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '38', 'D')\\\"> D. Violence within families only occurs for one generation and then naturally stops.</label></div><div id=\\\"res-6-38\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 39.</b> Which of the following can be inferred from the passage?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '39', 'A')\\\"> A. Economic abuse is not considered a serious form of domestic violence in Vietnam.</label><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '39', 'B')\\\"> B. Strengthening legal frameworks alone is sufficient to eliminate domestic and school violence.</label><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '39', 'C')\\\"> C. Victims of school violence are ready to report incidents if asked by teachers and school authorities.</label><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '39', 'D')\\\"> D. Comprehensive solutions to violence require changes in both individual behavior and societal attitudes.</label></div><div id=\\\"res-6-39\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 40.</b> Which of the following best summarizes the entire passage?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q40\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '40', 'A')\\\"> A. The primary solution to violence in Vietnam lies in punishing perpetrators more severely and ignoring cultural factors.</label><label><input type=\\\"radio\\\" name=\\\"q40\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '40', 'B')\\\"> B. Vietnamese society is unwilling to discuss or address issues of domestic and school violence due to traditional norms.</label><label><input type=\\\"radio\\\" name=\\\"q40\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '40', 'C')\\\"> C. Vietnam faces ongoing challenges with domestic and school violence, necessitating multi-faceted solutions involving awareness, education, and strengthened support systems.</label><label><input type=\\\"radio\\\" name=\\\"q40\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '40', 'D')\\\"> D. Domestic and school violence are easily detected problems in Vietnam, mainly caused by a lack of strict laws and poor enforcement.</label></div><div id=\\\"res-6-40\\\" style=\\\"margin-top:5px\\\"></div></div></div></div></div>\"}; const allKeys = DATA.keys; \n\n        // --- CÁC HÀM XỬ LÝ (ĐÃ UPDATE LOGIC KEY BIỆT LẬP) ---\n        function showGapOptions(e, secId, id) { \n            const p = document.getElementById('gap-popover'); \n            const uniqueKey = secId + '-' + id; \n            const o = DATA.gapOptions[uniqueKey]; \n            if(!o) return;\n            let h = \"\"; \n            for(let k in o) h += '<span class=\"popover-option\" onclick=\"selectGap(\\''+secId+'\\', \\''+id+'\\', \\''+k+'\\', \\''+o[k].replace(/'/g, \"\\\\'\")+'\\')\"><b>'+k+'.</b> '+o[k]+'</span>'; \n            p.innerHTML = h; p.style.display = 'block'; p.style.left = e.pageX + 'px'; p.style.top = (e.pageY + 20) + 'px'; \n            setTimeout(() => { document.addEventListener('click', function close(ev) { if (!p.contains(ev.target) && ev.target !== e.target) { p.style.display = 'none'; document.removeEventListener('click', close); } }); }, 0); \n        } \n\n        function selectGap(secId, qId, key, text) { \n            const btn = document.getElementById('gap-'+secId+'-'+qId); \n            if(!btn) return;\n            btn.innerText = text; btn.classList.add('filled'); \n            document.getElementById('gap-popover').style.display = 'none'; \n            \n            // CHECK KEY: Dùng secId-qId để tìm key trong kho\n            const fullKey = secId + '-' + qId;\n            if(allKeys[fullKey]) { \n                btn.style.borderColor = (key === allKeys[fullKey]) ? \"#22c55e\" : \"#ef4444\"; \n                btn.classList.remove('correct', 'wrong'); \n                if(key === allKeys[fullKey]) btn.classList.add('correct'); else btn.classList.add('wrong'); \n            } \n        } \n\n        function checkWordForm() { \n            const inputs = document.querySelectorAll('.word-form-input'); \n            inputs.forEach(inp => { \n                // ID input: wf-secId-qNum\n                const parts = inp.id.split('-');\n                const fullKey = parts[1] + '-' + parts[2];\n                \n                const userVal = inp.value.trim().toLowerCase(); \n                const correctKey = allKeys[fullKey] ? String(allKeys[fullKey]).trim().toLowerCase() : \"\"; \n                inp.classList.remove('correct', 'wrong'); \n                const parent = inp.parentNode; \n                const oldCorr = parent.querySelector('.correction-text'); \n                if(oldCorr) oldCorr.remove(); \n                if (!correctKey) return; \n                if (userVal === correctKey) { inp.classList.add('correct'); } \n                else { inp.classList.add('wrong'); const span = document.createElement('span'); span.className = 'correction-text'; span.innerHTML = '✓ ' + allKeys[fullKey]; if(inp.nextSibling) { parent.insertBefore(span, inp.nextSibling); } else { parent.appendChild(span); } } \n            }); \n        }\n\n        // HÀM CHECK MCQ MỚI (CHO BÀI READING)\n        function checkMCQ(secId, qId, selected) { \n            const resDiv = document.getElementById('res-'+secId+'-'+qId);\n            const fullKey = secId + '-' + qId;\n            resDiv.innerHTML = (allKeys[fullKey] && selected === allKeys[fullKey]) ? '<span style=\"color:#22c55e\">✓ Correct</span>' : '<span style=\"color:#ef4444\">✗ Incorrect</span>'; \n        }\n\n        // (GIỮ NGUYÊN CÁC HÀM KHÁC)\n        let dragSrcEl = null; function addDragEvents() { document.querySelectorAll('.sortable-item').forEach(item => { item.addEventListener('dragstart', function(e) { dragSrcEl = this; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/html', this.innerHTML); }); item.addEventListener('dragover', function(e) { if (e.preventDefault) e.preventDefault(); return false; }); item.addEventListener('drop', function(e) { if (e.stopPropagation) e.stopPropagation(); if (dragSrcEl !== this) { const srcHTML = dragSrcEl.innerHTML; const srcId = dragSrcEl.dataset.sid; dragSrcEl.innerHTML = this.innerHTML; dragSrcEl.dataset.sid = this.dataset.sid; this.innerHTML = srcHTML; this.dataset.sid = srcId; } return false; }); }); } window.onload = function() { addDragEvents(); }; \n        function checkOrder(qId, targetStr) { const list = document.getElementById('sortable-'+qId); const current = Array.from(list.getElementsByTagName('li')).map(li => li.dataset.sid); const ans = document.getElementById('ans-'+qId); const fb = document.getElementById('fb-'+qId); if(JSON.stringify(current) === JSON.stringify(targetStr.split(','))) { fb.innerHTML = '<span style=\"color:#22c55e\">✓ Correct!</span>'; ans.style.display = 'none'; } else { fb.innerHTML = '<span style=\"color:#ef4444\">✗ Incorrect</span>'; ans.style.display = 'block'; } } \n        function showVocabDef(key) { const d = DATA.vocabMap[key.toLowerCase()]; if(!d) return; document.getElementById('v-word').innerText = d.original; document.getElementById('v-meaning').innerText = d.meaning; document.getElementById('v-synonym').innerText = d.synonyms ? 'Synonyms: ' + d.synonyms : ''; document.getElementById('v-example').innerText = d.example ? 'Ex: ' + d.example : ''; document.getElementById('vocab-modal').style.display = 'block'; document.querySelector('.overlay').style.display = 'block'; } \n        function closeVocabModal() { document.getElementById('vocab-modal').style.display = 'none'; document.querySelector('.overlay').style.display = 'none'; }\n        function toggleFullScreenReading(btn) { const r = btn.closest('.section-box'); r.classList.toggle('fullscreen-reading'); btn.innerText = r.classList.contains('fullscreen-reading') ? '🗗 Exit Full Screen' : '⛶ Full Screen'; }\n\n        // GAME LOGIC\n        let pairs=[], gameState={engOrder:[],shuffledVie:[],matches:{},score:0};\n        const engListEl=document.getElementById('engList'), vieListEl=document.getElementById('vieList'), scoreEl=document.getElementById('score'), confettiEl=document.getElementById('confetti');\n        function loadPairsFromMap(){ pairs = []; for(let k in DATA.vocabMap){ pairs.push({eng: DATA.vocabMap[k].original, vie: DATA.vocabMap[k].meaning}); } }\n        window.openVocabGame = function() { loadPairsFromMap(); if(pairs.length===0){ alert(\"Không có từ vựng nào!\"); return; } document.getElementById('vocab-game-overlay').style.display='block'; initGame(); }\n        window.closeVocabGame = function() { document.getElementById('vocab-game-overlay').style.display='none'; }\n        function shuffleArray(a){ const b=a.slice(); for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; } return b; }\n        function initGame(){ gameState.matches={}; gameState.score=0; gameState.engOrder=shuffleArray(pairs.map((_,i)=>i)); gameState.shuffledVie=shuffleArray(pairs.map(p=>p.vie)); renderGameEng(); renderGameVie(); attachGameSlotEvents(); updateGameScore(); initFlashcards(); renderFillList(); }\n        function renderGameEng(){ engListEl.innerHTML=''; gameState.engOrder.forEach((o,p)=>{ const x=pairs[o]; const i=document.createElement('div'); i.className='game-eng-item'; i.innerHTML='<div class=\"game-eng-left\"><div class=\"game-index\">'+(p+1)+'</div><div><div style=\"font-weight:700\">'+x.eng+'</div></div></div><div class=\"game-slot\" data-index=\"'+o+'\" tabindex=\"0\"><div class=\"inner\"></div></div>'; engListEl.appendChild(i); }); }\n        function renderGameVie(){ vieListEl.innerHTML=''; gameState.shuffledVie.forEach((t,i)=>{ const d=document.createElement('div'); d.className='game-vie-item'; d.draggable=true; d.dataset.text=t; d.innerHTML='<span style=\"font-weight:600\">'+t+'</span>'; vieListEl.appendChild(d); d.addEventListener('dragstart',e=>{d.classList.add('dragging');e.dataTransfer.setData('text/plain',t);window.currentPicked={text:t,el:d}}); d.addEventListener('dragend',()=>d.classList.remove('dragging')); d.addEventListener('click',()=>{if(window.currentPicked&&window.currentPicked.el===d){window.currentPicked=null;d.style.outline=''}else{if(window.currentPicked)window.currentPicked.el.style.outline='';window.currentPicked={text:t,el:d};d.style.outline='2px solid rgba(6,182,212,0.8)'}}); }); }\n        function attachGameSlotEvents(){ document.querySelectorAll('.game-slot').forEach(s=>{ s.addEventListener('dragover',e=>{e.preventDefault();s.classList.add('active')}); s.addEventListener('dragleave',()=>s.classList.remove('active')); s.addEventListener('drop',e=>{e.preventDefault();s.classList.remove('active');const t=e.dataTransfer.getData('text/plain');handleGameDrop(s,t)}); s.addEventListener('click',()=>{if(window.currentPicked)handleGameDrop(s,window.currentPicked.text)}); }); }\n        function handleGameDrop(s,t){ const i=Number(s.dataset.index); const c=pairs[i].vie; if(gameState.matches[i])return; if(t===c){ s.classList.add('correct'); s.innerHTML='<div class=\"inner\"><span style=\"font-weight:700;color:var(--success)\">'+t+'</span></div>'; gameState.matches[i]=t; gameState.score++; updateGameScore(); celebrate(); speak(pairs[i].eng); const el=Array.from(document.querySelectorAll('.game-vie-item')).find(x=>x.dataset.text===t); if(el)el.remove(); window.currentPicked=null; }else{ s.classList.add('game-wrong'); setTimeout(()=>s.classList.remove('game-wrong'),400); } }\n        function updateGameScore(){ scoreEl.innerHTML='Đúng: <strong>'+gameState.score+'</strong> / '+pairs.length; }\n        function celebrate(){ const c=['#06b6d4','#f97316','#f43f5e','#10b981']; for(let i=0;i<15;i++){ const p=document.createElement('div'); p.className='piece'; p.style.left=Math.random()*100+'%'; p.style.background=c[Math.floor(Math.random()*c.length)]; confettiEl.appendChild(p); setTimeout(()=>p.remove(),1500); } }\n        function speak(t){ if('speechSynthesis' in window){ const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; speechSynthesis.speak(u); } }\n        let flashIndex=0;\n        function initFlashcards(){ flashIndex=0; renderFlash(); }\n        function renderFlash(){ if(!pairs.length)return; const p=pairs[flashIndex]; document.getElementById('flashFront').textContent=p.eng; document.getElementById('flashBack').textContent=p.vie; document.getElementById('flashcard').classList.remove('flipped'); }\n        document.getElementById('nextCard').addEventListener('click',()=>{flashIndex=(flashIndex+1)%pairs.length;renderFlash()}); document.getElementById('prevCard').addEventListener('click',()=>{flashIndex=(flashIndex-1+pairs.length)%pairs.length;renderFlash()}); document.getElementById('flipCard').addEventListener('click',()=>document.getElementById('flashcard').classList.toggle('flipped'));\n        const fillListEl=document.getElementById('fillList'), fillScoreEl=document.getElementById('fillScore');\n        function renderFillList(){ fillListEl.innerHTML=''; pairs.forEach((p,i)=>{ const r=document.createElement('div'); r.className='fill-row'; r.innerHTML='<div class=\"vie\">'+p.vie+'</div><input type=\"text\" data-index=\"'+i+'\" placeholder=\"...\" /><div class=\"game-small\" style=\"min-width:60px\" id=\"hint-'+i+'\"></div>'; fillListEl.appendChild(r); }); fillScoreEl.textContent='Điểm: 0 / '+pairs.length; }\n        document.getElementById('checkFill').addEventListener('click',()=>{ let c=0; pairs.forEach((p,i)=>{ const inp=fillListEl.querySelector('input[data-index=\"'+i+'\"]'); if(inp.value.trim().toLowerCase()===p.eng.toLowerCase()){c++;inp.classList.add('correct');}else{inp.classList.add('wrong');} }); fillScoreEl.textContent='Điểm: '+c+' / '+pairs.length; });\n        document.getElementById('showAnswers').addEventListener('click',()=>{ pairs.forEach((p,i)=>{ const inp=fillListEl.querySelector('input[data-index=\"'+i+'\"]'); inp.value=p.eng; inp.classList.add('correct'); }); });\n        document.getElementById('resetFill').addEventListener('click', renderFillList);\n        document.getElementById('shuffleBtn').addEventListener('click',()=>{gameState.matches={};gameState.score=0;gameState.engOrder=shuffleArray(gameState.engOrder);gameState.shuffledVie=shuffleArray(gameState.shuffledVie);renderGameEng();renderGameVie();attachGameSlotEvents();updateGameScore()});\n        document.getElementById('resetBtn').addEventListener('click',initGame);\n        <\/script>\n\t\t<script type=\"text/javascript\">var lbplugin_event_opt={\"extension_enable\":true,\"dict_type\":1,\"dbclk_event\":{\"trigger\":\"none\",\"enable\":true,\"display\":1},\"select_event\":{\"trigger\":\"none\",\"enable\":true,\"display\":1}};function loadScript(t,e){var n=document.createElement(\"script\");n.type=\"text/javascript\",n.readyState?n.onreadystatechange=function(){(\"loaded\"===n.readyState||\"complete\"===n.readyState)&&(n.onreadystatechange=null,e())}:n.onload=function(){e()},n.src=t,document.getElementsByTagName(\"head\")[0].appendChild(n)}setTimeout(function(){null==document.getElementById(\"lbdictex_find_popup\")&&loadScript(\"https://stc-laban.zdn.vn/dictionary/js/plugin/lbdictplugin.min.js?\"+Date.now()%1e4,function(){lbDictPlugin.init(lbplugin_event_opt)})},1e3);<\/script>\n\t\t</body></html>"},{"name":"index.html","filename":"index.html","content":"<!DOCTYPE html><html lang=\"vi\"><head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"><title>English Practice</title><style>\n        :root { --primary: #2563eb; --success: #16a34a; --error: #dc2626; --bg: #f8fafc; --highlight: #fef08a; } body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #333; line-height: 1.8; } #main { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); } .section-box { margin-bottom: 50px; } .section-title { font-size: 1.4em; font-weight: bold; color: var(--primary); margin: 0 0 15px 0; } .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-left: 5px solid var(--primary); padding-left: 15px; } .gap-fill-text { font-size: 1.15em; text-align: justify; line-height: 1.8; } \n        .gap-btn { display: inline; background: transparent; border: none; border-bottom: 1px dotted #94a3b8; color: var(--primary); font-weight: 600; cursor: pointer; padding: 0 2px; margin: 0 2px; font-size: inherit; font-family: inherit; transition: all 0.2s; } .gap-btn:hover { color: #1d4ed8; border-bottom-style: solid; } .gap-btn.filled { border-bottom: none; font-weight: bold; } .gap-btn.correct { color: var(--success) !important; } .gap-btn.wrong { color: var(--error) !important; text-decoration: line-through; }\n        .reading-container { display: flex; height: 650px; border: 1px solid #cbd5e1; border-radius: 8px; overflow: hidden; background:#fff; } .reading-left { flex: 1; padding: 25px; overflow-y: auto; background: #fff; border-right: 4px solid #f1f5f9; resize: horizontal; overflow-x: hidden; max-width: 70%; min-width: 30%; } .reading-right { flex: 1; padding: 25px; overflow-y: auto; background: #f8fafc; } .reading-left::-webkit-scrollbar, .reading-right::-webkit-scrollbar { width: 8px; } .reading-left::-webkit-scrollbar-track, .reading-right::-webkit-scrollbar-track { background: #f1f1f1; } .reading-left::-webkit-scrollbar-thumb, .reading-right::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; } \n        .vocab-highlight { background-color: transparent; border-bottom: 2px dashed #f59e0b; cursor: help; padding: 0 1px; color: inherit; font-weight: 500; transition: all 0.2s; } .vocab-highlight:hover { background-color: #fffbeb; color: #d97706; }\n        .mcq-question { margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; } .sortable-list { list-style: none; padding: 0; } .sortable-item { background: #fff; border: 1px solid #cbd5e1; padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: grab; display: flex; align-items: center; gap: 15px; } .popover { position: absolute; background: white; border: 1px solid #cbd5e1; box-shadow: 0 10px 25px rgba(0,0,0,0.15); border-radius: 8px; padding: 10px; z-index: 1000; display: none; min-width: 250px; max-width: 400px; } .popover-option { display: block; padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #f1f5f9; } .popover-option:hover { background-color: #f8fafc; color: var(--primary); } .vocab-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 400px; border-radius: 16px; z-index: 10000; display: none; border: 1px solid #e2e8f0; overflow:hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.2); } .vocab-header { background: var(--primary); color: white; padding: 15px 20px; font-weight: bold; font-size: 1.2em; } .vocab-body { padding: 20px; } .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9999; display: none; } button.action-btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; background: var(--primary); } \n        .mcq-options label { display: block; margin: 8px 0; cursor: pointer; padding:8px; border-radius:4px; transition:background 0.2s } .mcq-options label:hover { background-color: #f1f5f9; }\n        .fullscreen-reading { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; background: white; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; } .fullscreen-reading .reading-container { flex: 1; height: auto !important; } .fullscreen-btn { float: right; padding: 5px 10px; background: #475569; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9em; margin-bottom:5px; } .fullscreen-btn:hover { background: #334155; }\n        .btn-game { background: linear-gradient(90deg, #8b5cf6, #d946ef); color:white; padding:10px 20px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; margin-bottom:20px; }\n        .word-form-input { border: none; border-bottom: 2px solid #94a3b8; background: transparent; padding: 2px 5px; font-size: 1em; color: var(--primary); font-weight: bold; width: 150px; outline: none; transition: 0.3s; text-align: center; } .word-form-input:focus { border-bottom-color: var(--primary); background: #eff6ff; } .word-form-input.correct { border-bottom-color: var(--success); color: var(--success); background: #dcfce7; } .word-form-input.wrong { border-bottom-color: var(--error); color: var(--error); background: #fee2e2; text-decoration: line-through; } .correction-text { display: inline-block; margin-left: 8px; color: var(--success); font-weight: bold; font-size: 0.9em; background: #f0fdf4; padding: 2px 6px; border-radius: 4px; border: 1px solid #bbf7d0; }\n        @media (max-width: 768px) { .reading-container { flex-direction: column; height: auto; } .reading-left { resize: none; max-width: 100%; border-right: none; border-bottom: 4px solid #f1f5f9; max-height: 300px; } .vocab-modal { width: 90%; } }\n        \n        #vocab-game-overlay { position: fixed; inset: 0; z-index: 5000; background: #0f1724; display: none; overflow-y: auto; color: #e6eef6; }\n        #game-container { width:100%; max-width:1200px; margin: 0 auto; padding: 24px; }\n        .game-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }\n        .game-h1 { font-size:20px; margin:0; color:#06b6d4; }\n        .game-controls { display:flex; gap:8px; align-items:center; }\n        .game-btn { background:linear-gradient(90deg,#0ea5a4,#06b6d4); border:0; color:#042027; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:600; }\n        .game-btn-close { background: #ef4444; color: white; }\n        .game-layout { display:flex; gap:18px; align-items:flex-start; overflow-x:auto; padding-bottom:6px; }\n        .game-card { flex: 0 0 48%; min-width:320px; box-sizing:border-box; padding:12px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid rgba(255,255,255,0.03); max-height: calc(100vh - 180px); overflow:auto; }\n        .game-list { display:flex; flex-direction:column; gap:10px; }\n        .game-eng-item, .game-vie-item { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:10px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.03); color: #e6eef6; }\n        .game-eng-left { display:flex; align-items:center; gap:12px; flex: 0 0 220px; min-width:160px; }\n        .game-index { width:36px; height:36px; border-radius:8px; background:rgba(255,255,255,0.03); display:flex; align-items:center; justify-content:center; color:#94a3b8; font-weight:700; }\n        .game-slot { flex:1; display:flex; align-items:center; justify-content:flex-start; gap:10px; padding:12px 16px; border-radius:12px; background:rgba(255,255,255,0.01); border:2px dashed rgba(255,255,255,0.03); min-height:56px; transition:all 220ms ease; cursor:pointer; position:relative; overflow:visible; }\n        .game-slot .inner { position:relative; z-index:3; }\n        .game-slot.correct { padding-left:12px; font-size:15px; display:flex; align-items:center; border-style:solid; border-width:2px; background:linear-gradient(180deg, rgba(16,185,129,0.03), rgba(16,185,129,0.01)); }\n        .game-slot.correct::before { background: linear-gradient(90deg, rgba(16,185,129,0.9), rgba(96,165,250,0.06)); opacity:0.6; filter:blur(10px); }\n        .game-vie-list { display:flex; flex-wrap:wrap; gap:10px; padding-top:6px; }\n        .game-vie-item { cursor:grab; user-select:none; padding:8px 12px; border-radius:10px; background:linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border:1px solid rgba(255,255,255,0.03); }\n        .game-vie-item.dragging { opacity:0.5; transform:scale(0.98); }\n        .game-wrong { animation:shake 300ms; border-color:rgba(239,68,68,0.6); }\n        .game-badge { display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; background:rgba(255,255,255,0.02); color:#94a3b8; font-weight:600; }\n        .game-confetti { position:fixed; left:0; top:0; width:100%; height:100%; pointer-events:none; overflow:hidden; z-index:6000; }\n        .game-confetti .piece { position:absolute; width:10px; height:14px; opacity:0; animation:fall 1200ms linear forwards; }\n        .game-small { font-size:13px; color:#94a3b8; }\n        .flash-wrap { perspective:1200px; width:100%; max-width:520px; }\n        .flashcard { width:100%; height:140px; position:relative; transform-style:preserve-3d; transition:transform 600ms cubic-bezier(.2,.9,.3,1); border-radius:12px; cursor:pointer; }\n        .flashcard.flipped { transform:rotateY(180deg); }\n        .flash-face { position:absolute; inset:0; backface-visibility:hidden; border-radius:12px; display:flex; align-items:center; justify-content:center; padding:18px; font-size:18px; text-align:center; box-shadow: 0 6px 18px rgba(2,6,23,0.6); border:1px solid rgba(255,255,255,0.03); }\n        .flash-face.front { background:linear-gradient(180deg, rgba(6,182,212,0.08), rgba(96,165,250,0.03)); color:#e6f9fb; }\n        .flash-face.back { transform:rotateY(180deg); background:linear-gradient(180deg, rgba(16,185,129,0.06), rgba(96,165,250,0.02)); color:#eafff0; }\n        .fill-list { display:flex; flex-direction:column; gap:10px; }\n        .fill-row { display:flex; gap:12px; align-items:center; }\n        .fill-row .vie { flex:0 0 48%; min-width:160px; color:#94a3b8; }\n        .fill-row input { flex:1; padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.02); color:rgba(230,238,246,0.85); transition:all 180ms; }\n        .fill-row input.correct { border-color: rgba(16,185,129,0.7); background: rgba(16,185,129,0.02); }\n        .fill-row input.wrong { border-color: rgba(244,63,94,0.7); background: rgba(244,63,94,0.01); }\n        @keyframes shake{ 0%{transform:translateX(0)} 25%{transform:translateX(-6px)} 50%{transform:translateX(6px)} 75%{transform:translateX(-4px)} 100%{transform:translateX(0)} }\n        @keyframes fall{ 0%{opacity:1; transform:translateY(-10vh) rotate(0deg)} 100%{opacity:1; transform:translateY(110vh) rotate(720deg)} }\n        @media (max-width:880px){ .game-layout{grid-template-columns:1fr; flex-direction: column;} .game-card{flex-basis:100%; width:100%;} }\n        \n        </style></head>\n        <body>\n        <div id=\"main\">\n            <button class=\"btn-game\" onclick=\"openVocabGame()\">🎮 Play Vocab Game</button>\n            <h1>English Practice Test</h1>\n            <div class=\"section-box\"><h3 class=\"section-title\">Part 1: Gap Fill / Cloze Test</h3><div class=\"gap-fill-text\">133 TUITION<br>\tDo you love children? We need some tutors  <span class=\"gap-btn\" id=\"gap-1-1\" onclick=\"showGapOptions(event, '1', '1')\">(1)</span>  students aged 6 and 9 at 133 Duong Ba Trac, Ward 1, District 8 this summer.<br>● You will work with children full of  <span class=\"gap-btn\" id=\"gap-1-2\" onclick=\"showGapOptions(event, '1', '2')\">(2)</span> . <br>● Good appearance is needed. Don't worry  <span class=\"gap-btn\" id=\"gap-1-3\" onclick=\"showGapOptions(event, '1', '3')\">(3)</span>  you have tutored before.<br>●  <span class=\"gap-btn\" id=\"gap-1-4\" onclick=\"showGapOptions(event, '1', '4')\">(4)</span> . <br>\tHow  <span class=\"gap-btn\" id=\"gap-1-5\" onclick=\"showGapOptions(event, '1', '5')\">(5)</span> ? Our tutors must provide  <span class=\"gap-btn\" id=\"gap-1-6\" onclick=\"showGapOptions(event, '1', '6')\">(6)</span>  IDs and criminal records, and they must pass our rigorous application process. If you want to know more about our process, please visit us at www.hcmctutoring.vn.<br><br></div></div><div class=\"section-box\"><h3 class=\"section-title\">Part 2: Gap Fill / Cloze Test</h3><div class=\"gap-fill-text\">ANNOUNCEMENT OF CHINESE SPEAKING CONTEST<br>The  <span class=\"gap-btn\" id=\"gap-2-7\" onclick=\"showGapOptions(event, '2', '7')\">(7)</span>  would like to announce:<br>● We  <span class=\"gap-btn\" id=\"gap-2-8\" onclick=\"showGapOptions(event, '2', '8')\">(8)</span>  a Chinese Speaking Competition on June 01. <br>● All students  <span class=\"gap-btn\" id=\"gap-2-9\" onclick=\"showGapOptions(event, '2', '9')\">(9)</span>  in speaking Chinese can take part in this exciting contest! <br>● Express your ideas confidently,  <span class=\"gap-btn\" id=\"gap-2-10\" onclick=\"showGapOptions(event, '2', '10')\">(10)</span>  you build your self-assurance in using Chinese.<br>● Get ready to share your thoughts  <span class=\"gap-btn\" id=\"gap-2-11\" onclick=\"showGapOptions(event, '2', '11')\">(11)</span>  our friendly atmosphere.<br>● Keep an eye out for more details  <span class=\"gap-btn\" id=\"gap-2-12\" onclick=\"showGapOptions(event, '2', '12')\">(12)</span>  to participate in the contest!<br><br></div></div><div class=\"section-box\"><h3 class=\"section-title\">Part 3: Sentence Rearrangement</h3><div style=\"margin-bottom:30px\"><strong>Question 13.</strong> Drag/Drop:<ul class=\"sortable-list\" id=\"sortable-13\"><li class=\"sortable-item\" draggable=\"true\" data-sid=\"d\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>d.</b> Firstly, peer pressure can lead to risky behaviors such as substance abuse, smoking, or involvement in harmful activities.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"a\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>a.</b> Finally, difficulties in communication and forming genuine connections due to social media and technology dependence are common among teens.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"c\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>c.</b> Teens often face various social challenges.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"e\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>e.</b> Moreover, mental health issues, including anxiety and depression, are prevalent among teenagers due to academic stress or social pressures.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"b\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>b.</b> Additionally, cyberbullying and online harassment present significant challenges in the digital age.</li></ul><button class=\"action-btn btn-primary\" onclick=\"checkOrder('13', 'c,d,e,b,a')\">Check</button><span id=\"fb-13\" style=\"margin-left:10px\"></span><div id=\"ans-13\" style=\"display:none;color:#22c55e;margin-top:5px\">Correct: c - d - e - b - a</div></div><div style=\"margin-bottom:30px\"><strong>Question 14.</strong> Drag/Drop:<ul class=\"sortable-list\" id=\"sortable-14\"><li class=\"sortable-item\" draggable=\"true\" data-sid=\"a\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>a.</b> Also, when we do chores like sweeping or washing dishes, we're moving our bodies, which is good for our health.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"d\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>d.</b> Firstly, it helps keep our home tidy and clean, making it a nicer place to live.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"e\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>e.</b> Additionally, children learn to be responsible and take care of our things when they help with tasks at home.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"b\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>b.</b> Dear Mike, I hope you are well! I've been thinking about why it’s important for children to share the household chores with their parents.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"c\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>c.</b> Sharing the household chores is really a good way to help us have more time to do fun things together.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"f\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>f.</b> Best wishes.</li></ul><button class=\"action-btn btn-primary\" onclick=\"checkOrder('14', 'b,d,a,e,c,f')\">Check</button><span id=\"fb-14\" style=\"margin-left:10px\"></span><div id=\"ans-14\" style=\"display:none;color:#22c55e;margin-top:5px\">Correct: b - d - a - e - c - f</div></div><div style=\"margin-bottom:30px\"><strong>Question 15.</strong> Drag/Drop:<ul class=\"sortable-list\" id=\"sortable-15\"><li class=\"sortable-item\" draggable=\"true\" data-sid=\"e\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>e.</b> I have several years of professional property management experience at The Whitney Apartments and am confident that my skills and abilities would be a great asset to RAP Properties. During the entirety of my role as a property manager at The Whitney Apartments, I have had zero vacancies and steady positive approval ratings from both residents and senior management.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"c\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>c.</b> I have a proven record of managing 100 plus unit apartment complexes, supervising employees, preparing budgets, processing applications, and working closely with residents and maintenance, security, and professional personnel to ensure clean, safe, and properly run properties.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"d\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>d.</b> I am excited to discuss further how my qualifications could benefit RAP Properties and hope that you can add my name
