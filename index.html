weight:bold;font-size:1.2em\">☰</span> <b>d.</b> B: $20 per dozen.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"g\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>g.</b> A: I'll take a dozen.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"h\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>h.</b> B: Very well. We have some fresh red roses.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"j\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>j.</b> A: That sounds like a good deal.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"b\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>b.</b> B: Yes, they're on sale today.</li></ul><button class=\"action-btn btn-primary\" onclick=\"checkOrder('17', 'f,h,a,d,j,b,g,c,i,e')\">Check</button><span id=\"fb-17\" style=\"margin-left:10px\"></span><div id=\"ans-17\" style=\"display:none;color:#22c55e;margin-top:5px\">Correct: f - h - a - d - j - b - g - c - i - e</div></div></div><div class=\"section-box\"><h3 class=\"section-title\">Part 4: Gap Fill / Cloze Test</h3><div class=\"gap-fill-text\">Finishing high school is a big step  <span class=\"gap-btn\" id=\"gap-4-18\" onclick=\"showGapOptions(event, '4', '18')\">(18)</span> . There are various paths to choose from after leaving school, and each one offers unique opportunities. Some students decide to continue their studies at universities. Universities have many subjects to learn, like science, art, or business. They offer degrees that can lead to exciting careers. This option allows students to dive deeper into subjects they are passionate about. For others, vocational training is a great choice. Vocational training focuses on specific skills that are important in jobs like mechanics, cooking, or healthcare. It gives practical knowledge and  <span class=\"gap-btn\" id=\"gap-4-19\" onclick=\"showGapOptions(event, '4', '19')\">(19)</span> . Another option is  <span class=\"gap-btn\" id=\"gap-4-20\" onclick=\"showGapOptions(event, '4', '20')\">(20)</span> . These colleges offer courses that are practical and also give the chance to move to bigger universities later. They are a good starting point for many students.<br>Apprenticeships are great for those who like to learn while working. This option gives hands-on experience in fields such as engineering, culinary arts, or information technology. It not only facilitates the acquisition of comprehensive knowledge and advanced skills but also enables individuals to gain valuable experience and  <span class=\"gap-btn\" id=\"gap-4-21\" onclick=\"showGapOptions(event, '4', '21')\">(21)</span> .<br>In recent times, online courses have become very popular. These courses offer flexibility  <span class=\"gap-btn\" id=\"gap-4-22\" onclick=\"showGapOptions(event, '4', '22')\">(22)</span> . They cover a wide range of subjects and give access to education no matter where someone lives.<br>In conclusion, there are many paths available after finishing school. Each path has its advantages and can lead to a bright future. It's important for school leavers to explore these options and choose the one that suits them best.<br></div></div><div class=\"section-box\">\n                    <div class=\"section-header\">\n                        <h3 class=\"section-title\">Part 5: Reading</h3>\n                        <button class=\"fullscreen-btn\" onclick=\"toggleFullScreenReading(this)\">⛶ Full Screen</button>\n                    </div>\n                    <div class=\"reading-container\" id=\"reading-5\"><div class=\"reading-left\">An engine is a machine that creates mechanical motion from energy. In order to do this, an engine frequently requires some type of fuel to burn. Nowadays, many engines are used to power cars and other forms of transportation. These vehicles most commonly have an internal combustion engine and rely upon gasoline for power. However, there are several types of engines that can use <b>alternative energy sources</b>. Many people are trying to switch to them because gasoline, which is a fossil fuel, creates pollution and is also a non-renewable resource. <br><br>These days, engines that are able to burn biofuels are somewhat common. Biofuels are fuels that are made from biological material, such as corn, soybeans, and sugarcane. These biofuels burn cleanly, so they produce much less pollution than fossil fuels. In some countries, such as Brazil, cars with biofuel engines are standard. In fact, most of the cars in Brazil have engines that can operate on either gasoline or biofuel.<br><br>A second type of alternative engine is the electric engine. Cars with electric engines have been common for decades. Most are being used in hybrid cars at the moment. These are vehicles that have both a gasoline-powered engine and an electric one. In many cases, the gasoline-powered engine is used to operate the car at high speeds on expressways. The electric engine is utilised for city driving. One benefit of hybrid cars is that as the gasoline-powered engine runs, it simultaneously <b>recharges</b> the electric engine.<br><br>A third type of alternative engine is the hydrogen engine. It utilises hydrogen fuel cells, which convert hydrogen into electricity that can power the car These days, there are many cars and buses that rely upon hydrogen engines. However, there are some problems associated with this type of engine. The hydrogen used in the engine must be processed from other materials, and it is also difficult to store. As a result, vehicles that run on hydrogen are expensive.<br><br>Alternative energy sources create less pollution and are often renewable sources of energy. It is hoped that more and more innovations help the use of alternative energy sources become easier and easier.<br><br></div><div class=\"reading-right\"><div class=\"mcq-question\"><b>Question 23.</b> Which of the following is not mentioned in the text above as renewable energy?<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q23\" value=\"A\" onchange=\"checkMCQ('5', '23', 'A')\"> A. Gasoline</label><label><input type=\"radio\" name=\"q23\" value=\"B\" onchange=\"checkMCQ('5', '23', 'B')\"> B. Biofuel</label><label><input type=\"radio\" name=\"q23\" value=\"C\" onchange=\"checkMCQ('5', '23', 'C')\"> C. Hydrogen</label><label><input type=\"radio\" name=\"q23\" value=\"D\" onchange=\"checkMCQ('5', '23', 'D')\"> D. Electricity</label></div><div id=\"res-5-23\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 24.</b> The phrase alternative energy sources in paragraph 1 is OPPOSITE in meaning to _____.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q24\" value=\"A\" onchange=\"checkMCQ('5', '24', 'A')\"> A. Hybrid engines</label><label><input type=\"radio\" name=\"q24\" value=\"B\" onchange=\"checkMCQ('5', '24', 'B')\"> B. Fossil fuels</label><label><input type=\"radio\" name=\"q24\" value=\"C\" onchange=\"checkMCQ('5', '24', 'C')\"> C. Biological fuels</label><label><input type=\"radio\" name=\"q24\" value=\"D\" onchange=\"checkMCQ('5', '24', 'D')\"> D. Electric engines</label></div><div id=\"res-5-24\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 25.</b> The word “recharges” is closest in meaning to _______.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q25\" value=\"A\" onchange=\"checkMCQ('5', '25', 'A')\"> A. resumes</label><label><input type=\"radio\" name=\"q25\" value=\"B\" onchange=\"checkMCQ('5', '25', 'B')\"> B. retreats</label><label><input type=\"radio\" name=\"q25\" value=\"C\" onchange=\"checkMCQ('5', '25', 'C')\"> C. repels</label><label><input type=\"radio\" name=\"q25\" value=\"D\" onchange=\"checkMCQ('5', '25', 'D')\"> D. refreshes</label></div><div id=\"res-5-25\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 26.</b> The author uses corn, soybeans, and sugarcane as examples of _______.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q26\" value=\"A\" onchange=\"checkMCQ('5', '26', 'A')\"> A. crops that are grown in Brazil</label><label><input type=\"radio\" name=\"q26\" value=\"B\" onchange=\"checkMCQ('5', '26', 'B')\"> B. plants that can be eaten by people</label><label><input type=\"radio\" name=\"q26\" value=\"C\" onchange=\"checkMCQ('5', '26', 'C')\"> C. biological materials that grow quickly</label><label><input type=\"radio\" name=\"q26\" value=\"D\" onchange=\"checkMCQ('5', '26', 'D')\"> D. things that can be turned into biofuels</label></div><div id=\"res-5-26\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 27.</b> Which of the following best paraphrases the underlined sentence in paragraph 5?<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q27\" value=\"A\" onchange=\"checkMCQ('5', '27', 'A')\"> A. Alternative sources of energy can be used up and cause contamination.</label><label><input type=\"radio\" name=\"q27\" value=\"B\" onchange=\"checkMCQ('5', '27', 'B')\"> B. Alternative sources of energy are never used up but cause contamination.</label><label><input type=\"radio\" name=\"q27\" value=\"C\" onchange=\"checkMCQ('5', '27', 'C')\"> C. Alternative sources of energy are unlimited and hardly cause pollution.</label><label><input type=\"radio\" name=\"q27\" value=\"D\" onchange=\"checkMCQ('5', '27', 'D')\"> D. Alternative sources of energy are limited but cause no pollution.</label></div><div id=\"res-5-27\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 28.</b> What is True about a hybrid car?<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q28\" value=\"A\" onchange=\"checkMCQ('5', '28', 'A')\"> A. It runs on both gasoline and electricity at the same time.</label><label><input type=\"radio\" name=\"q28\" value=\"B\" onchange=\"checkMCQ('5', '28', 'B')\"> B. It runs on electricity and produces gasoline at the same time.</label><label><input type=\"radio\" name=\"q28\" value=\"C\" onchange=\"checkMCQ('5', '28', 'C')\"> C. It has one engine producing electricity while the other runs on gasoline.</label><label><input type=\"radio\" name=\"q28\" value=\"D\" onchange=\"checkMCQ('5', '28', 'D')\"> D. It has one engine running on gasoline while the other runs on electricity.</label></div><div id=\"res-5-28\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 29.</b> In which paragraph does the writer mention the engines running on H2.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q29\" value=\"A\" onchange=\"checkMCQ('5', '29', 'A')\"> A. Paragraph 1</label><label><input type=\"radio\" name=\"q29\" value=\"B\" onchange=\"checkMCQ('5', '29', 'B')\"> B. Paragraph 2</label><label><input type=\"radio\" name=\"q29\" value=\"C\" onchange=\"checkMCQ('5', '29', 'C')\"> C. Paragraph 3</label><label><input type=\"radio\" name=\"q29\" value=\"D\" onchange=\"checkMCQ('5', '29', 'D')\"> D. Paragraph 4</label></div><div id=\"res-5-29\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 30.</b> In which paragraph does the writer mention cars running on biofuel and gasoline?<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q30\" value=\"A\" onchange=\"checkMCQ('5', '30', 'A')\"> A. Paragraph 2</label><label><input type=\"radio\" name=\"q30\" value=\"B\" onchange=\"checkMCQ('5', '30', 'B')\"> B. Paragraph 3</label><label><input type=\"radio\" name=\"q30\" value=\"C\" onchange=\"checkMCQ('5', '30', 'C')\"> C. Paragraph 4</label><label><input type=\"radio\" name=\"q30\" value=\"D\" onchange=\"checkMCQ('5', '30', 'D')\"> D. Paragraph 5</label></div><div id=\"res-5-30\" style=\"margin-top:5px\"></div></div></div></div></div><div class=\"section-box\">\n                    <div class=\"section-header\">\n                        <h3 class=\"section-title\">Part 6: Reading</h3>\n                        <button class=\"fullscreen-btn\" onclick=\"toggleFullScreenReading(this)\">⛶ Full Screen</button>\n                    </div>\n                    <div class=\"reading-container\" id=\"reading-6\"><div class=\"reading-left\">Managing change means managing people's fear. Change is natural and good, but people's reaction to change is unpredictable and can be irrational. It can be managed if done right.<br><br>Nothing is as upsetting to your people as change. Nothing has greater potential to cause failures, loss of production, or falling quality of work. Yet nothing is as important to the survival of your organization as change. History is full of examples of organizations that failed to change and are now extinct. The secret to successfully managing change, from the perspective of the employees, is definition and understanding.<br><br>Resistance to change comes from a fear of the unknown or an expectation of loss. The front end of an individual's resistance to change is how they <b>perceive</b> the change. The back end is how well they are equipped to deal with the change they expect.<br><br><b>An individual's degree of resistance to change is determined by whether they perceive the change as good or bad, and how severe they expect the impact of the change to be on them</b>. Their ultimate acceptance of the change is a function of how much resistance the person has and the quality of their coping skills and their support system.<br><br>If you move an employee's desk six inches, they may not notice or care. Yet if the reason you moved it those six inches was to fit in another worker in an adjacent desk, there may be high resistance to the change. It depends on whether the original employee feels the hiring of an additional employee is a threat to his job or perceives the hiring as bringing in some needed assistance.<br><br>A promotion is usually considered a good change. However, an employee who doubts <b>their</b> ability to handle the new job may strongly resist the promotion. They will give you all kinds of reasons for not wanting the promotion, just not the real one.<br><br>You might expect a higher-level employee to be less concerned about being laid off because they have savings and investments to support them during a job search. However, the individual may feel they are overextended and that a job search will be long and complicated. Conversely, your concern for a low-income employee being laid off may be unfounded if they have stashed a nest egg in anticipation of the cut.<br><br>Your best salesperson may balk at taking on new, high-potential account because they have an irrational feeling that they don't dress well enough.<br><br>If you try and <b>bulldoze</b> this resistance, you will fail. <b>[A]</b> The employee whose desk you had to move will develop production problems. <b>[B]</b> The top worker who keeps declining the promotion may quit rather than have to continue making up excuses for turning you down. <b>[C]</b> And the top salesperson's sales may drop to the point that you stop considering them for the new account. <b>[D]</b><br><br></div><div class=\"reading-right\"><div class=\"mcq-question\"><b>Question 31.</b> Which of the following best serves as the title for the passage?<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q31\" value=\"A\" onchange=\"checkMCQ('6', '31', 'A')\"> A. Managing people in the time of change</label><label><input type=\"radio\" name=\"q31\" value=\"B\" onchange=\"checkMCQ('6', '31', 'B')\"> B. Managing change: Managing fear</label><label><input type=\"radio\" name=\"q31\" value=\"C\" onchange=\"checkMCQ('6', '31', 'C')\"> C. Tips for laying off employees without resistance</label><label><input type=\"radio\" name=\"q31\" value=\"D\" onchange=\"checkMCQ('6', '31', 'D')\"> D. Failing to change: Planning to fail</label></div><div id=\"res-6-31\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 32.</b> The word “perceive” in paragraph 3 is closest in meaning to _____.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q32\" value=\"A\" onchange=\"checkMCQ('6', '32', 'A')\"> A. understand</label><label><input type=\"radio\" name=\"q32\" value=\"B\" onchange=\"checkMCQ('6', '32', 'B')\"> B. present</label><label><input type=\"radio\" name=\"q32\" value=\"C\" onchange=\"checkMCQ('6', '32', 'C')\"> C. perform</label><label><input type=\"radio\" name=\"q32\" value=\"D\" onchange=\"checkMCQ('6', '32', 'D')\"> D. employ</label></div><div id=\"res-6-32\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 33.</b> The word “their” in paragraph 6 refers to ______.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q33\" value=\"A\" onchange=\"checkMCQ('6', '33', 'A')\"> A. an employee’s</label><label><input type=\"radio\" name=\"q33\" value=\"B\" onchange=\"checkMCQ('6', '33', 'B')\"> B. a change’s</label><label><input type=\"radio\" name=\"q33\" value=\"C\" onchange=\"checkMCQ('6', '33', 'C')\"> C. a promotion</label><label><input type=\"radio\" name=\"q33\" value=\"D\" onchange=\"checkMCQ('6', '33', 'D')\"> D. a new job’s</label></div><div id=\"res-6-33\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 34.</b> The word “bulldoze” in paragraph 8 mostly means ______.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q34\" value=\"A\" onchange=\"checkMCQ('6', '34', 'A')\"> A. suppress</label><label><input type=\"radio\" name=\"q34\" value=\"B\" onchange=\"checkMCQ('6', '34', 'B')\"> B. ignore</label><label><input type=\"radio\" name=\"q34\" value=\"C\" onchange=\"checkMCQ('6', '34', 'C')\"> C. encourage</label><label><input type=\"radio\" name=\"q34\" value=\"D\" onchange=\"checkMCQ('6', '34', 'D')\"> D. receive</label></div><div id=\"res-6-34\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 35.</b> Where does the following sentence best fit?\n\tInstead, you overcome the resistance by defining the change and by getting a mutual understanding.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q35\" value=\"A\" onchange=\"checkMCQ('6', '35', 'A')\"> A. [A]</label><label><input type=\"radio\" name=\"q35\" value=\"B\" onchange=\"checkMCQ('6', '35', 'B')\"> B. [B]</label><label><input type=\"radio\" name=\"q35\" value=\"C\" onchange=\"checkMCQ('6', '35', 'C')\"> C. [C]</label><label><input type=\"radio\" name=\"q35\" value=\"D\" onchange=\"checkMCQ('6', '35', 'D')\"> D. [D]</label></div><div id=\"res-6-35\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 36.</b> Which of the following best expresses the essential information in the underlined sentence in paragraph 4?<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q36\" value=\"A\" onchange=\"checkMCQ('6', '36', 'A')\"> A. It is the employee’s perception of the change itself and the influence the change may exert on them that decide their reaction to change.</label><label><input type=\"radio\" name=\"q36\" value=\"B\" onchange=\"checkMCQ('6', '36', 'B')\"> B. The more determination the employee has, the more resistant he or she is when dealing with the serious impact that the change has on him or her.</label><label><input type=\"radio\" name=\"q36\" value=\"C\" onchange=\"checkMCQ('6', '36', 'C')\"> C. No matter how determined an employee may be, they are unable to resist to the change that has too severe effects on them.</label><label><input type=\"radio\" name=\"q36\" value=\"D\" onchange=\"checkMCQ('6', '36', 'D')\"> D. A person will resist to change until the level that the severity of the effects caused by the change gets beyond his or her determination.</label></div><div id=\"res-6-36\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 37.</b> Which of the following is True about change?<div class=\"mcq-options\"><label><input type=\"radio\ ap\":{},\"htmlContent\":\"<div class=\\\"section-box\\\"><h3 class=\\\"section-title\\\">Part 1: Gap Fill / Cloze Test</h3><div class=\\\"gap-fill-text\\\">133 TUITION<br>\\tDo you love children? We need some tutors  <span class=\\\"gap-btn\\\" id=\\\"gap-1-1\\\" onclick=\\\"showGapOptions(event, '1', '1')\\\">(1)</span>  students aged 6 and 9 at 133 Duong Ba Trac, Ward 1, District 8 this summer.<br>● You will work with children full of  <span class=\\\"gap-btn\\\" id=\\\"gap-1-2\\\" onclick=\\\"showGapOptions(event, '1', '2')\\\">(2)</span> . <br>● Good appearance is needed. Don't worry  <span class=\\\"gap-btn\\\" id=\\\"gap-1-3\\\" onclick=\\\"showGapOptions(event, '1', '3')\\\">(3)</span>  you have tutored before.<br>●  <span class=\\\"gap-btn\\\" id=\\\"gap-1-4\\\" onclick=\\\"showGapOptions(event, '1', '4')\\\">(4)</span> . <br>\\tHow  <span class=\\\"gap-btn\\\" id=\\\"gap-1-5\\\" onclick=\\\"showGapOptions(event, '1', '5')\\\">(5)</span> ? Our tutors must provide  <span class=\\\"gap-btn\\\" id=\\\"gap-1-6\\\" onclick=\\\"showGapOptions(event, '1', '6')\\\">(6)</span>  IDs and criminal records, and they must pass our rigorous application process. If you want to know more about our process, please visit us at www.hcmctutoring.vn.<br><br></div></div><div class=\\\"section-box\\\"><h3 class=\\\"section-title\\\">Part 2: Gap Fill / Cloze Test</h3><div class=\\\"gap-fill-text\\\">ANNOUNCEMENT OF CHINESE SPEAKING CONTEST<br>The  <span class=\\\"gap-btn\\\" id=\\\"gap-2-7\\\" onclick=\\\"showGapOptions(event, '2', '7')\\\">(7)</span>  would like to announce:<br>● We  <span class=\\\"gap-btn\\\" id=\\\"gap-2-8\\\" onclick=\\\"showGapOptions(event, '2', '8')\\\">(8)</span>  a Chinese Speaking Competition on June 01. <br>● All students  <span class=\\\"gap-btn\\\" id=\\\"gap-2-9\\\" onclick=\\\"showGapOptions(event, '2', '9')\\\">(9)</span>  in speaking Chinese can take part in this exciting contest! <br>● Express your ideas confidently,  <span class=\\\"gap-btn\\\" id=\\\"gap-2-10\\\" onclick=\\\"showGapOptions(event, '2', '10')\\\">(10)</span>  you build your self-assurance in using Chinese.<br>● Get ready to share your thoughts  <span class=\\\"gap-btn\\\" id=\\\"gap-2-11\\\" onclick=\\\"showGapOptions(event, '2', '11')\\\">(11)</span>  our friendly atmosphere.<br>● Keep an eye out for more details  <span class=\\\"gap-btn\\\" id=\\\"gap-2-12\\\" onclick=\\\"showGapOptions(event, '2', '12')\\\">(12)</span>  to participate in the contest!<br><br></div></div><div class=\\\"section-box\\\"><h3 class=\\\"section-title\\\">Part 3: Sentence Rearrangement</h3><div style=\\\"margin-bottom:30px\\\"><strong>Question 13.</strong> Drag/Drop:<ul class=\\\"sortable-list\\\" id=\\\"sortable-13\\\"><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"d\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>d.</b> Firstly, peer pressure can lead to risky behaviors such as substance abuse, smoking, or involvement in harmful activities.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"a\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>a.</b> Finally, difficulties in communication and forming genuine connections due to social media and technology dependence are common among teens.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"c\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>c.</b> Teens often face various social challenges.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"e\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>e.</b> Moreover, mental health issues, including anxiety and depression, are prevalent among teenagers due to academic stress or social pressures.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"b\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>b.</b> Additionally, cyberbullying and online harassment present significant challenges in the digital age.</li></ul><button class=\\\"action-btn btn-primary\\\" onclick=\\\"checkOrder('13', 'c,d,e,b,a')\\\">Check</button><span id=\\\"fb-13\\\" style=\\\"margin-left:10px\\\"></span><div id=\\\"ans-13\\\" style=\\\"display:none;color:#22c55e;margin-top:5px\\\">Correct: c - d - e - b - a</div></div><div style=\\\"margin-bottom:30px\\\"><strong>Question 14.</strong> Drag/Drop:<ul class=\\\"sortable-list\\\" id=\\\"sortable-14\\\"><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"a\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>a.</b> Also, when we do chores like sweeping or washing dishes, we're moving our bodies, which is good for our health.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"d\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>d.</b> Firstly, it helps keep our home tidy and clean, making it a nicer place to live.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"e\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>e.</b> Additionally, children learn to be responsible and take care of our things when they help with tasks at home.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"b\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>b.</b> Dear Mike, I hope you are well! I've been thinking about why it’s important for children to share the household chores with their parents.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"c\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>c.</b> Sharing the household chores is really a good way to help us have more time to do fun things together.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"f\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>f.</b> Best wishes.</li></ul><button class=\\\"action-btn btn-primary\\\" onclick=\\\"checkOrder('14', 'b,d,a,e,c,f')\\\">Check</button><span id=\\\"fb-14\\\" style=\\\"margin-left:10px\\\"></span><div id=\\\"ans-14\\\" style=\\\"display:none;color:#22c55e;margin-top:5px\\\">Correct: b - d - a - e - c - f</div></div><div style=\\\"margin-bottom:30px\\\"><strong>Question 15.</strong> Drag/Drop:<ul class=\\\"sortable-list\\\" id=\\\"sortable-15\\\"><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"e\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>e.</b> I have several years of professional property management experience at The Whitney Apartments and am confident that my skills and abilities would be a great asset to RAP Properties. During the entirety of my role as a property manager at The Whitney Apartments, I have had zero vacancies and steady positive approval ratings from both residents and senior management.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"c\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>c.</b> I have a proven record of managing 100 plus unit apartment complexes, supervising employees, preparing budgets, processing applications, and working closely with residents and maintenance, security, and professional personnel to ensure clean, safe, and properly run properties.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"d\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>d.</b> I am excited to discuss further how my qualifications could benefit RAP Properties and hope that you can add my name to your list of potential candidates for future property management positions. Thank you so much for your time and consideration.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"a\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>a.</b> Additionally, revenue streams have increased more than 60 percent over the five years I have been part of The Whitney team.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"b\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>b.</b> I have been following the recent growth of the business after the launch of your new apartment complex in Queens. I am writing to express my sincere interest in working with the property management team at RAP Properties.</li></ul><button class=\\\"action-btn btn-primary\\\" onclick=\\\"checkOrder('15', 'b,e,a,c,d')\\\">Check</button><span id=\\\"fb-15\\\" style=\\\"margin-left:10px\\\"></span><div id=\\\"ans-15\\\" style=\\\"display:none;color:#22c55e;margin-top:5px\\\">Correct: b - e - a - c - d</div></div><div style=\\\"margin-bottom:30px\\\"><strong>Question 16.</strong> Drag/Drop:<ul class=\\\"sortable-list\\\" id=\\\"sortable-16\\\"><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"d\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>d.</b> Carol: Then what?</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"b\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>b.</b> Mike: What's stopping you?</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"f\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>f.</b> Carol: What do I have to do?</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"a\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>a.</b> Mike: Click on whichever option you want, and you're done.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"c\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>c.</b> Mike: Slide your card into the machine and type your PIN in.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"e\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>e.</b> Carol: I need to use the ATM.</li></ul><button class=\\\"action-btn btn-primary\\\" onclick=\\\"checkOrder('16', 'e,b,f,c,d,a')\\\">Check</button><span id=\\\"fb-16\\\" style=\\\"margin-left:10px\\\"></span><div id=\\\"ans-16\\\" style=\\\"display:none;color:#22c55e;margin-top:5px\\\">Correct: e - b - f - c - d - a</div></div><div style=\\\"margin-bottom:30px\\\"><strong>Question 17.</strong> Drag/Drop:<ul class=\\\"sortable-list\\\" id=\\\"sortable-17\\\"><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"c\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>c.</b> B: Splendid. Will there be anything else?</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"i\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>i.</b> A: No, the roses will be fine.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"a\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>a.</b> A: How much are the roses?</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"f\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>f.</b> A: I need some flowers for my wife. It's her birthday.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"e\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>e.</b> B: I'm sure your wife will love them.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"d\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>d.</b> B: $20 per dozen.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"g\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>g.</b> A: I'll take a dozen.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"h\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>h.</b> B: Very well. We have some fresh red roses.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"j\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>j.</b> A: That sounds like a good deal.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"b\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>b.</b> B: Yes, they're on sale today.</li></ul><button class=\\\"action-btn btn-primary\\\" onclick=\\\"checkOrder('17', 'f,h,a,d,j,b,g,c,i,e')\\\">Check</button><span id=\\\"fb-17\\\" style=\\\"margin-left:10px\\\"></span><div id=\\\"ans-17\\\" style=\\\"display:none;color:#22c55e;margin-top:5px\\\">Correct: f - h - a - d - j - b - g - c - i - e</div></div></div><div class=\\\"section-box\\\"><h3 class=\\\"section-title\\\">Part 4: Gap Fill / Cloze Test</h3><div class=\\\"gap-fill-text\\\">Finishing high school is a big step  <span class=\\\"gap-btn\\\" id=\\\"gap-4-18\\\" onclick=\\\"showGapOptions(event, '4', '18')\\\">(18)</span> . There are various paths to choose from after leaving school, and each one offers unique opportunities. Some students decide to continue their studies at universities. Universities have many subjects to learn, like science, art, or business. They offer degrees that can lead to exciting careers. This option allows students to dive deeper into subjects they are passionate about. For others, vocational training is a great choice. Vocational training focuses on specific skills that are important in jobs like mechanics, cooking, or healthcare. It gives practical knowledge and  <span class=\\\"gap-btn\\\" id=\\\"gap-4-19\\\" onclick=\\\"showGapOptions(event, '4', '19')\\\">(19)</span> . Another option is  <span class=\\\"gap-btn\\\" id=\\\"gap-4-20\\\" onclick=\\\"showGapOptions(event, '4', '20')\\\">(20)</span> . These colleges offer courses that are practical and also give the chance to move to bigger universities later. They are a good starting point for many students.<br>Apprenticeships are great for those who like to learn while working. This option gives hands-on experience in fields such as engineering, culinary arts, or information technology. It not only facilitates the acquisition of comprehensive knowledge and advanced skills but also enables individuals to gain valuable experience and  <span class=\\\"gap-btn\\\" id=\\\"gap-4-21\\\" onclick=\\\"showGapOptions(event, '4', '21')\\\">(21)</span> .<br>In recent times, online courses have become very popular. These courses offer flexibility  <span class=\\\"gap-btn\\\" id=\\\"gap-4-22\\\" onclick=\\\"showGapOptions(event, '4', '22')\\\">(22)</span> . They cover a wide range of subjects and give access to education no matter where someone lives.<br>In conclusion, there are many paths available after finishing school. Each path has its advantages and can lead to a bright future. It's important for school leavers to explore these options and choose the one that suits them best.<br></div></div><div class=\\\"section-box\\\">\\n                    <div class=\\\"section-header\\\">\\n                        <h3 class=\\\"section-title\\\">Part 5: Reading</h3>\\n                        <button class=\\\"fullscreen-btn\\\" onclick=\\\"toggleFullScreenReading(this)\\\">⛶ Full Screen</button>\\n                    </div>\\n                    <div class=\\\"reading-container\\\" id=\\\"reading-5\\\"><div class=\\\"reading-left\\\">An engine is a machine that creates mechanical motion from energy. In order to do this, an engine frequently requires some type of fuel to burn. Nowadays, many engines are used to power cars and other forms of transportation. These vehicles most commonly have an internal combustion engine and rely upon gasoline for power. However, there are several types of engines that can use <b>alternative energy sources</b>. Many people are trying to switch to them because gasoline, which is a fossil fuel, creates pollution and is also a non-renewable resource. <br><br>These days, engines that are able to burn biofuels are somewhat common. Biofuels are fuels that are made from biological material, such as corn, soybeans, and sugarcane. These biofuels burn cleanly, so they produce much less pollution than fossil fuels. In some countries, such as Brazil, cars with biofuel engines are standard. In fact, most of the cars in Brazil have engines that can operate on either gasoline or biofuel.<br><br>A second type of alternative engine is the electric engine. Cars with electric engines have been common for decades. Most are being used in hybrid cars at the moment. These are vehicles that have both a gasoline-powered engine and an electric one. In many cases, the gasoline-powered engine is used to operate the car at high speeds on expressways. The electric engine is utilised for city driving. One benefit of hybrid cars is that as the gasoline-powered engine runs, it simultaneously <b>recharges</b> the electric engine.<br><br>A third type of alternative engine is the hydrogen engine. It utilises hydrogen fuel cells, which convert hydrogen into electricity that can power the car These days, there are many cars and buses that rely upon hydrogen engines. However, there are some problems associated with this type of engine. The hydrogen used in the engine must be processed from other materials, and it is also difficult to store. As a result, vehicles that run on hydrogen are expensive.<br><br>Alternative energy sources create less pollution and are often renewable sources of energy. It is hoped that more and more innovations help the use of alternative energy sources become easier and easier.<br><br></div><div class=\\\"reading-right\\\"><div class=\\\"mcq-question\\\"><b>Question 23.</b> Which of the following is not mentioned in the text above as renewable energy?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q23\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '23', 'A')\\\"> A. Gasoline</label><label><input type=\\\"radio\\\" name=\\\"q23\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '23', 'B')\\\"> B. Biofuel</label><label><input type=\\\"radio\\\" name=\\\"q23\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '23', 'C')\\\"> C. Hydrogen</label><label><input type=\\\"radio\\\" name=\\\"q23\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '23', 'D')\\\"> D. Electricity</label></div><div id=\\\"res-5-23\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 24.</b> The phrase alternative energy sources in paragraph 1 is OPPOSITE in meaning to _____.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q24\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '24', 'A')\\\"> A. Hybrid engines</label><label><input type=\\\"radio\\\" name=\\\"q24\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '24', 'B')\\\"> B. Fossil fuels</label><label><input type=\\\"radio\\\" name=\\\"q24\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '24', 'C')\\\"> C. Biological fuels</label><label><input type=\\\"radio\\\" name=\\\"q24\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '24', 'D')\\\"> D. Electric engines</label></div><div id=\\\"res-5-24\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 25.</b> The word “recharges” is closest in meaning to _______.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q25\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '25', 'A')\\\"> A. resumes</label><label><input type=\\\"radio\\\" name=\\\"q25\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '25', 'B')\\\"> B. retreats</label><label><input type=\\\"radio\\\" name=\\\"q25\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '25', 'C')\\\"> C. repels</label><label><input type=\\\"radio\\\" name=\\\"q25\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '25', 'D')\\\"> D. refreshes</label></div><div id=\\\"res-5-25\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 26.</b> The author uses corn, soybeans, and sugarcane as examples of _______.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q26\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '26', 'A')\\\"> A. crops that are grown in Brazil</label><label><input type=\\\"radio\\\" name=\\\"q26\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '26', 'B')\\\"> B. plants that can be eaten by people</label><label><input type=\\\"radio\\\" name=\\\"q26\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '26', 'C')\\\"> C. biological materials that grow quickly</label><label><input type=\\\"radio\\\" name=\\\"q26\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '26', 'D')\\\"> D. things that can be turned into biofuels</label></div><div id=\\\"res-5-26\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 27.</b> Which of the following best paraphrases the underlined sentence in paragraph 5?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q27\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '27', 'A')\\\"> A. Alternative sources of energy can be used up and cause contamination.</label><label><input type=\\\"radio\\\" name=\\\"q27\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '27', 'B')\\\"> B. Alternative sources of energy are never used up but cause contamination.</label><label><input type=\\\"radio\\\" name=\\\"q27\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '27', 'C')\\\"> C. Alternative sources of energy are unlimited and hardly cause pollution.</label><label><input type=\\\"radio\\\" name=\\\"q27\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '27', 'D')\\\"> D. Alternative sources of energy are limited but cause no pollution.</label></div><div id=\\\"res-5-27\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 28.</b> What is True about a hybrid car?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q28\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '28', 'A')\\\"> A. It runs on both gasoline and electricity at the same time.</label><label><input type=\\\"radio\\\" name=\\\"q28\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '28', 'B')\\\"> B. It runs on electricity and produces gasoline at the same time.</label><label><input type=\\\"radio\\\" name=\\\"q28\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '28', 'C')\\\"> C. It has one engine producing electricity while the other runs on gasoline.</label><label><input type=\\\"radio\\\" name=\\\"q28\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '28', 'D')\\\"> D. It has one engine running on gasoline while the other runs on electricity.</label></div><div id=\\\"res-5-28\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 29.</b> In which paragraph does the writer mention the engines running on H2.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q29\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '29', 'A')\\\"> A. Paragraph 1</label><label><input type=\\\"radio\\\" name=\\\"q29\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '29', 'B')\\\"> B. Paragraph 2</label><label><input type=\\\"radio\\\" name=\\\"q29\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '29', 'C')\\\"> C. Paragraph 3</label><label><input type=\\\"radio\\\" name=\\\"q29\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '29', 'D')\\\"> D. Paragraph 4</label></div><div id=\\\"res-5-29\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 30.</b> In which paragraph does the writer mention cars running on biofuel and gasoline?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q30\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '30', 'A')\\\"> A. Paragraph 2</label><label><input type=\\\"radio\\\" name=\\\"q30\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '30', 'B')\\\"> B. Paragraph 3</label><label><input type=\\\"radio\\\" name=\\\"q30\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '30', 'C')\\\"> C. Paragraph 4</label><label><input type=\\\"radio\\\" name=\\\"q30\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '30', 'D')\\\"> D. Paragraph 5</label></div><div id=\\\"res-5-30\\\" style=\\\"margin-top:5px\\\"></div></div></div></div></div><div class=\\\"section-box\\\">\\n                    <div class=\\\"section-header\\\">\\n                        <h3 class=\\\"section-title\\\">Part 6: Reading</h3>\\n                        <button class=\\\"fullscreen-btn\\\" onclick=\\\"toggleFullScreenReading(this)\\\">⛶ Full Screen</button>\\n                    </div>\\n                    <div class=\\\"reading-container\\\" id=\\\"reading-6\\\"><div class=\\\"reading-left\\\">Managing change means managing people's fear. Change is natural and good, but people's reaction to change is unpredictable and can be irrational. It can be managed if done right.<br><br>Nothing is as upsetting to your people as change. Nothing has greater potential to cause failures, loss of production, or falling quality of work. Yet nothing is as important to the survival of your organization as change. History is full of examples of organizations that failed to change and are now extinct. The secret to successfully managing change, from the perspective of the employees, is definition and understanding.<br><br>Resistance to change comes from a fear of the unknown or an expectation of loss. The front end of an individual's resistance to change is how they <b>perceive</b> the change. The back end is how well they are equipped to deal with the change they expect.<br><br><b>An individual's degree of resistance to change is determined by whether they perceive the change as good or bad, and how severe they expect the impact of the change to be on them</b>. Their ultimate acceptance of the change is a function of how much resistance the person has and the quality of their coping skills and their support system.<br><br>If you move an employee's desk six inches, they may not notice or care. Yet if the reason you moved it those six inches was to fit in another worker in an adjacent desk, there may be high resistance to the change. It depends on whether the original employee feels the hiring of an additional employee is a threat to his job or perceives the hiring as bringing in some needed assistance.<br><br>A promotion is usually considered a good change. However, an employee who doubts <b>their</b> ability to handle the new job may strongly resist the promotion. They will give you all kinds of reasons for not wanting the promotion, just not the real one.<br><br>You might expect a higher-level employee to be less concerned about being laid off because they have savings and investments to support them during a job search. However, the individual may feel they are overextended and that a job search will be long and complicated. Conversely, your concern for a low-income employee being laid off may be unfounded if they have stashed a nest egg in anticipation of the cut.<br><br>Your best salesperson may balk at taking on new, high-potential account because they have an irrational feeling that they don't dress well enough.<br><br>If you try and <b>bulldoze</b> this resistance, you will fail. <b>[A]</b> The employee whose desk you had to move will develop production problems. <b>[B]</b> The top worker who keeps declining the promotion may quit rather than have to continue making up excuses for turning you down. <b>[C]</b> And the top salesperson's sales may drop to the point that you stop considering them for the new account. <b>[D]</b><br><br></div><div class=\\\"reading-right\\\"><div class=\\\"mcq-question\\\"><b>Question 31.</b> Which of the following best serves as the title for the passage?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q31\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '31', 'A')\\\"> A. Managing people in the time of change</label><label><input type=\\\"radio\\\" name=\\\"q31\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '31', 'B')\\\"> B. Managing change: Managing fear</label><label><input type=\\\"radio\\\" name=\\\"q31\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '31', 'C')\\\"> C. Tips for laying off employees without resistance</label><label><input type=\\\"radio\\\" name=\\\"q31\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '31', 'D')\\\"> D. Failing to change: Planning to fail</label></div><div id=\\\"res-6-31\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 32.</b> The word “perceive” in paragraph 3 is closest in meaning to _____.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q32\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '32', 'A')\\\"> A. understand</label><label><input type=\\\"radio\\\" name=\\\"q32\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '32', 'B')\\\"> B. present</label><label><input type=\\\"radio\\\" name=\\\"q32\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '32', 'C')\\\"> C. perform</label><label><input type=\\\"radio\\\" name=\\\"q32\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '32', 'D')\\\"> D. employ</label></div><div id=\\\"res-6-32\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 33.</b> The word “their” in paragraph 6 refers to ______.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q33\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '33', 'A')\\\"> A. an employee’s</label><label><input type=\\\"radio\\\" name=\\\"q33\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '33', 'B')\\\"> B. a change’s</label><label><input type=\\\"radio\\\" name=\\\"q33\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '33', 'C')\\\"> C. a promotion</label><label><input type=\\\"radio\\\" name=\\\"q33\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '33', 'D')\\\"> D. a new job’s</label></div><div id=\\\"res-6-33\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 34.</b> The word “bulldoze” in paragraph 8 mostly means ______.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q34\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '34', 'A')\\\"> A. suppress</label><label><input type=\\\"radio\\\" name=\\\"q34\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '34', 'B')\\\"> B. ignore</label><label><input type=\\\"radio\\\" name=\\\"q34\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '34', 'C')\\\"> C. encourage</label><label><input type=\\\"radio\\\" name=\\\"q34\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '34', 'D')\\\"> D. receive</label></div><div id=\\\"res-6-34\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 35.</b> Where does the following sentence best fit?\\n\\tInstead, you overcome the resistance by defining the change and by getting a mutual understanding.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q35\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '35', 'A')\\\"> A. [A]</label><label><input type=\\\"radio\\\" name=\\\"q35\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '35', 'B')\\\"> B. [B]</label><label><input type=\\\"radio\\\" name=\\\"q35\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '35', 'C')\\\"> C. [C]</label><label><input type=\\\"radio\\\" name=\\\"q35\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '35', 'D')\\\"> D. [D]</label></div><div id=\\\"res-6-35\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 36.</b> Which of the following best expresses the essential information in the underlined sentence in paragraph 4?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '36', 'A')\\\"> A. It is the employee’s perception of the change itself and the influence the change may exert on them that decide their reaction to change.</label><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '36', 'B')\\\"> B. The more determination the employee has, the more resistant he or she is when dealing with the serious impact that the change has on him or her.</label><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '36', 'C')\\\"> C. No matter how determined an employee may be, they are unable to resist to the change that has too severe effects on them.</label><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '36', 'D')\\\"> D. A person will resist to change until the level that the severity of the effects caused by the change gets beyond his or her determination.</label></div><div id=\\\"res-6-36\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 37.</b> Which of the following is True about change?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '37', 'A')\\\"> A. Change itself is not problematic but it is the way people react to change that causes problems.</label><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '37', 'B')\\\"> B. Change is of little importance to the survival and development of an organisation.</label><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '37', 'C')\\\"> C. The organisations that have been inflexible to change can sustain during the course of time.</label><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '37', 'D')\\\"> D. Most of the employers keep changes a secret and will not easily tell employees of the changes.</label></div><div id=\\\"res-6-37\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 38.</b> What are the two things that employees should bear in mind when managing change?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '38', 'A')\\\"> A. Defining it and understand it</label><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '38', 'B')\\\"> B. Predicting it and resisting it</label><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '38', 'C')\\\"> C. Expecting it and combatting it</label><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '38', 'D')\\\"> D. Perceiving it and expecting it</label></div><div id=\\\"res-6-38\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 39.</b> Why does the author mention moving an employee’s desk?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '39', 'A')\\\"> A. To show how small a change may be</label><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '39', 'B')\\\"> B. To show how this action can be perceived differently</label><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '39', 'C')\\\"> C. To explain that most employees don’t welcome change</label><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '39', 'D')\\\"> D. To highlight the need of change in the workplace</label></div><div id=\\\"res-6-39\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 40.</b> Who would most probably be the target readers of the passage?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q40\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '40', 'A')\\\"> A. Employers</label><label><input type=\\\"radio\\\" name=\\\"q40\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '40', 'B')\\\"> B. Employees</label><label><input type=\\\"radio\\\" name=\\\"q40\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '40', 'C')\\\"> C. Psychologists</label><label><input type=\\\"radio\\\" name=\\\"q40\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '40', 'D')\\\"> D. Reformers</label></div><div id=\\\"res-6-40\\\" style=\\\"margin-top:5px\\\"></div></div></div></div></div>\"}; const allKeys = DATA.keys; \n\n        // --- CÁC HÀM XỬ LÝ (ĐÃ UPDATE LOGIC KEY BIỆT LẬP) ---\n        function showGapOptions(e, secId, id) { \n            const p = document.getElementById('gap-popover'); \n            const uniqueKey = secId + '-' + id; \n            const o = DATA.gapOptions[uniqueKey]; \n            if(!o) return;\n            let h = \"\"; \n            for(let k in o) h += '<span class=\"popover-option\" onclick=\"selectGap(\\''+secId+'\\', \\''+id+'\\', \\''+k+'\\', \\''+o[k].replace(/'/g, \"\\\\'\")+'\\')\"><b>'+k+'.</b> '+o[k]+'</span>'; \n            p.innerHTML = h; p.style.display = 'block'; p.style.left = e.pageX + 'px'; p.style.top = (e.pageY + 20) + 'px'; \n            setTimeout(() => { document.addEventListener('click', function close(ev) { if (!p.contains(ev.target) && ev.target !== e.target) { p.style.display = 'none'; document.removeEventListener('click', close); } }); }, 0); \n        } \n\n        function selectGap(secId, qId, key, text) { \n            const btn = document.getElementById('gap-'+secId+'-'+qId); \n            if(!btn) return;\n            btn.innerText = text; btn.classList.add('filled'); \n            document.getElementById('gap-popover').style.display = 'none'; \n            \n            // CHECK KEY: Dùng secId-qId để tìm key trong kho\n            const fullKey = secId + '-' + qId;\n            if(allKeys[fullKey]) { \n                btn.style.borderColor = (key === allKeys[fullKey]) ? \"#22c55e\" : \"#ef4444\"; \n                btn.classList.remove('correct', 'wrong'); \n                if(key === allKeys[fullKey]) btn.classList.add('correct'); else btn.classList.add('wrong'); \n            } \n        } \n\n        function checkWordForm() { \n            const inputs = document.querySelectorAll('.word-form-input'); \n            inputs.forEach(inp => { \n                // ID input: wf-secId-qNum\n                const parts = inp.id.split('-');\n                const fullKey = parts[1] + '-' + parts[2];\n                \n                const userVal = inp.value.trim().toLowerCase(); \n                const correctKey = allKeys[fullKey] ? String(allKeys[fullKey]).trim().toLowerCase() : \"\"; \n                inp.classList.remove('correct', 'wrong'); \n                const parent = inp.parentNode; \n                const oldCorr = parent.querySelector('.correction-text'); \n                if(oldCorr) oldCorr.remove(); \n                if (!correctKey) return; \n                if (userVal === correctKey) { inp.classList.add('correct'); } \n                else { inp.classList.add('wrong'); const span = document.createElement('span'); span.className = 'correction-text'; span.innerHTML = '✓ ' + allKeys[fullKey]; if(inp.nextSibling) { parent.insertBefore(span, inp.nextSibling); } else { parent.appendChild(span); } } \n            }); \n        }\n\n        // HÀM CHECK MCQ MỚI (CHO BÀI READING)\n        function checkMCQ(secId, qId, selected) { \n            const resDiv = document.getElementById('res-'+secId+'-'+qId);\n            const fullKey = secId + '-' + qId;\n            resDiv.innerHTML = (allKeys[fullKey] && selected === allKeys[fullKey]) ? '<span style=\"color:#22c55e\">✓ Correct</span>' : '<span style=\"color:#ef4444\">✗ Incorrect</span>'; \n        }\n\n        // (GIỮ NGUYÊN CÁC HÀM KHÁC)\n        let dragSrcEl = null; function addDragEvents() { document.querySelectorAll('.sortable-item').forEach(item => { item.addEventListener('dragstart', function(e) { dragSrcEl = this; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/html', this.innerHTML); }); item.addEventListener('dragover', function(e) { if (e.preventDefault) e.preventDefault(); return false; }); item.addEventListener('drop', function(e) { if (e.stopPropagation) e.stopPropagation(); if (dragSrcEl !== this) { const srcHTML = dragSrcEl.innerHTML; const srcId = dragSrcEl.dataset.sid; dragSrcEl.innerHTML = this.innerHTML; dragSrcEl.dataset.sid = this.dataset.sid; this.innerHTML = srcHTML; this.dataset.sid = srcId; } return false; }); }); } window.onload = function() { addDragEvents(); }; \n        function checkOrder(qId, targetStr) { const list = document.getElementById('sortable-'+qId); const current = Array.from(list.getElementsByTagName('li')).map(li => li.dataset.sid); const ans = document.getElementById('ans-'+qId); const fb = document.getElementById('fb-'+qId); if(JSON.stringify(current) === JSON.stringify(targetStr.split(','))) { fb.innerHTML = '<span style=\"color:#22c55e\">✓ Correct!</span>'; ans.style.display = 'none'; } else { fb.innerHTML = '<span style=\"color:#ef4444\">✗ Incorrect</span>'; ans.style.display = 'block'; } } \n        function showVocabDef(key) { const d = DATA.vocabMap[key.toLowerCase()]; if(!d) return; document.getElementById('v-word').innerText = d.original; document.getElementById('v-meaning').innerText = d.meaning; document.getElementById('v-synonym').innerText = d.synonyms ? 'Synonyms: ' + d.synonyms : ''; document.getElementById('v-example').innerText = d.example ? 'Ex: ' + d.example : ''; document.getElementById('vocab-modal').style.display = 'block'; document.querySelector('.overlay').style.display = 'block'; } \n        function closeVocabModal() { document.getElementById('vocab-modal').style.display = 'none'; document.querySelector('.overlay').style.display = 'none'; }\n        function toggleFullScreenReading(btn) { const r = btn.closest('.section-box'); r.classList.toggle('fullscreen-reading'); btn.innerText = r.classList.contains('fullscreen-reading') ? '🗗 Exit Full Screen' : '⛶ Full Screen'; }\n\n        // GAME LOGIC\n        let pairs=[], gameState={engOrder:[],shuffledVie:[],matches:{},score:0};\n        const engListEl=document.getElementById('engList'), vieListEl=document.getElementById('vieList'), scoreEl=document.getElementById('score'), confettiEl=document.getElementById('confetti');\n        function loadPairsFromMap(){ pairs = []; for(let k in DATA.vocabMap){ pairs.push({eng: DATA.vocabMap[k].original, vie: DATA.vocabMap[k].meaning}); } }\n        window.openVocabGame = function() { loadPairsFromMap(); if(pairs.length===0){ alert(\"Không có từ vựng nào!\"); return; } document.getElementById('vocab-game-overlay').style.display='block'; initGame(); }\n        window.closeVocabGame = function() { document.getElementById('vocab-game-overlay').style.display='none'; }\n        function shuffleArray(a){ const b=a.slice(); for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; } return b; }\n        function initGame(){ gameState.matches={}; gameState.score=0; gameState.engOrder=shuffleArray(pairs.map((_,i)=>i)); gameState.shuffledVie=shuffleArray(pairs.map(p=>p.vie)); renderGameEng(); renderGameVie(); attachGameSlotEvents(); updateGameScore(); initFlashcards(); renderFillList(); }\n        function renderGameEng(){ engListEl.innerHTML=''; gameState.engOrder.forEach((o,p)=>{ const x=pairs[o]; const i=document.createElement('div'); i.className='game-eng-item'; i.innerHTML='<div class=\"game-eng-left\"><div class=\"game-index\">'+(p+1)+'</div><div><div style=\"font-weight:700\">'+x.eng+'</div></div></div><div class=\"game-slot\" data-index=\"'+o+'\" tabindex=\"0\"><div class=\"inner\"></div></div>'; engListEl.appendChild(i); }); }\n        function renderGameVie(){ vieListEl.innerHTML=''; gameState.shuffledVie.forEach((t,i)=>{ const d=document.createElement('div'); d.className='game-vie-item'; d.draggable=true; d.dataset.text=t; d.innerHTML='<span style=\"font-weight:600\">'+t+'</span>'; vieListEl.appendChild(d); d.addEventListener('dragstart',e=>{d.classList.add('dragging');e.dataTransfer.setData('text/plain',t);window.currentPicked={text:t,el:d}}); d.addEventListener('dragend',()=>d.classList.remove('dragging')); d.addEventListener('click',()=>{if(window.currentPicked&&window.currentPicked.el===d){window.currentPicked=null;d.style.outline=''}else{if(window.currentPicked)window.currentPicked.el.style.outline='';window.currentPicked={text:t,el:d};d.style.outline='2px solid rgba(6,182,212,0.8)'}}); }); }\n        function attachGameSlotEvents(){ document.querySelectorAll('.game-slot').forEach(s=>{ s.addEventListener('dragover',e=>{e.preventDefault();s.classList.add('active')}); s.addEventListener('dragleave',()=>s.classList.remove('active')); s.addEventListener('drop',e=>{e.preventDefault();s.classList.remove('active');const t=e.dataTransfer.getData('text/plain');handleGameDrop(s,t)}); s.addEventListener('click',()=>{if(window.currentPicked)handleGameDrop(s,window.currentPicked.text)}); }); }\n        function handleGameDrop(s,t){ const i=Number(s.dataset.index); const c=pairs[i].vie; if(gameState.matches[i])return; if(t===c){ s.classList.add('correct'); s.innerHTML='<div class=\"inner\"><span style=\"font-weight:700;color:var(--success)\">'+t+'</span></div>'; gameState.matches[i]=t; gameState.score++; updateGameScore(); celebrate(); speak(pairs[i].eng); const el=Array.from(document.querySelectorAll('.game-vie-item')).find(x=>x.dataset.text===t); if(el)el.remove(); window.currentPicked=null; }else{ s.classList.add('game-wrong'); setTimeout(()=>s.classList.remove('game-wrong'),400); } }\n        function updateGameScore(){ scoreEl.innerHTML='Đúng: <strong>'+gameState.score+'</strong> / '+pairs.length; }\n        function celebrate(){ const c=['#06b6d4','#f97316','#f43f5e','#10b981']; for(let i=0;i<15;i++){ const p=document.createElement('div'); p.className='piece'; p.style.left=Math.random()*100+'%'; p.style.background=c[Math.floor(Math.random()*c.length)]; confettiEl.appendChild(p); setTimeout(()=>p.remove(),1500); } }\n        function speak(t){ if('speechSynthesis' in window){ const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; speechSynthesis.speak(u); } }\n        let flashIndex=0;\n        function initFlashcards(){ flashIndex=0; renderFlash(); }\n        function renderFlash(){ if(!pairs.length)return; const p=pairs[flashIndex]; document.getElementById('flashFront').textContent=p.eng; document.getElementById('flashBack').textContent=p.vie; document.getElementById('flashcard').classList.remove('flipped'); }\n        document.getElementById('nextCard').addEventListener('click',()=>{flashIndex=(flashIndex+1)%pairs.length;renderFlash()}); document.getElementById('prevCard').addEventListener('click',()=>{flashIndex=(flashIndex-1+pairs.length)%pairs.length;renderFlash()}); document.getElementById('flipCard').addEventListener('click',()=>document.getElementById('flashcard').classList.toggle('flipped'));\n        const fillListEl=document.getElementById('fillList'), fillScoreEl=document.getElementById('fillScore');\n        function renderFillList(){ fillListEl.innerHTML=''; pairs.forEach((p,i)=>{ const r=document.createElement('div'); r.className='fill-row'; r.innerHTML='<div class=\"vie\">'+p.vie+'</div><input type=\"text\" data-index=\"'+i+'\" placeholder=\"...\" /><div class=\"game-small\" style=\"min-width:60px\" id=\"hint-'+i+'\"></div>'; fillListEl.appendChild(r); }); fillScoreEl.textContent='Điểm: 0 / '+pairs.length; }\n        document.getElementById('checkFill').addEventListener('click',()=>{ let c=0; pairs.forEach((p,i)=>{ const inp=fillListEl.querySelector('input[data-index=\"'+i+'\"]'); if(inp.value.trim().toLowerCase()===p.eng.toLowerCase()){c++;inp.classList.add('correct');}else{inp.classList.add('wrong');} }); fillScoreEl.textContent='Điểm: '+c+' / '+pairs.length; });\n        document.getElementById('showAnswers').addEventListener('click',()=>{ pairs.forEach((p,i)=>{ const inp=fillListEl.querySelector('input[data-index=\"'+i+'\"]'); inp.value=p.eng; inp.classList.add('correct'); }); });\n        document.getElementById('resetFill').addEventListener('click', renderFillList);\n        document.getElementById('shuffleBtn').addEventListener('click',()=>{gameState.matches={};gameState.score=0;gameState.engOrder=shuffleArray(gameState.engOrder);gameState.shuffledVie=shuffleArray(gameState.shuffledVie);renderGameEng();renderGameVie();attachGameSlotEvents();updateGameScore()});\n        document.getElementById('resetBtn').addEventListener('click',initGame);\n        <\/script>\n\t\t<script type=\"text/javascript\">var lbplugin_event_opt={\"extension_enable\":true,\"dict_type\":1,\"dbclk_event\":{\"trigger\":\"none\",\"enable\":true,\"display\":1},\"select_event\":{\"trigger\":\"none\",\"enable\":true,\"display\":1}};function loadScript(t,e){var n=document.createElement(\"script\");n.type=\"text/javascript\",n.readyState?n.onreadystatechange=function(){(\"loaded\"===n.readyState||\"complete\"===n.readyState)&&(n.onreadystatechange=null,e())}:n.onload=function(){e()},n.src=t,document.getElementsByTagName(\"head\")[0].appendChild(n)}setTimeout(function(){null==document.getElementById(\"lbdictex_find_popup\")&&loadScript(\"https://stc-laban.zdn.vn/dictionary/js/plugin/lbdictplugin.min.js?\"+Date.now()%1e4,function(){lbDictPlugin.init(lbplugin_event_opt)})},1e3);<\/script>\n\t\t</body></html>"}];
    const select = document.getElementById('selectBai');
    const openBtn = document.getElementById('openBtn');
    const clearBtn = document.getElementById('clearBtn');
    const frame = document.getElementById('frame');
    const controlsBar = document.getElementById('controlsBar');

    // populate select
    items.forEach((it, idx) => {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = it.name || it.filename || ('Bài ' + (idx+1));
      select.appendChild(opt);
    });

    function enterFullscreenMode() {
      // hide controls and expand iframe
      controlsBar.classList.add('hidden');
      frame.classList.add('fullscreen-frame');

      // create close button if chưa có
      if (!document.getElementById('closeFullscreen')) {
        const btn = document.createElement('button');
        btn.id = 'closeFullscreen';
        btn.textContent = 'Đóng toàn màn hình';
        btn.onclick = exitFullscreenMode;
        document.body.appendChild(btn);
      }
    }

    function exitFullscreenMode() {
      // restore controls and iframe
      controlsBar.classList.remove('hidden');
      frame.classList.remove('fullscreen-frame');
      const btn = document.getElementById('closeFullscreen');
      if (btn) btn.remove();
    }

    openBtn.onclick = () => {
      const v = select.value;
      if (v === '') {
        alert('Vui lòng chọn một bài.');
        return;
      }
      const it = items[+v];
      frame.srcdoc = it.content;

      // vào chế độ toàn màn hình
      enterFullscreenMode();
    };

    clearBtn.onclick = () => {
      select.value = '';
      frame.srcdoc = '<p>Chưa chọn bài</p>';
    };

    // allow Enter key to open when select focused
    select.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') openBtn.click();
    });

    // Escape để thoát toàn màn hình
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        exitFullscreenMode();
      }
    });
  </script>
