      left: 0 !important;

      height: 100vh !important;

      border-radius: 0 !important;
      border: none !important;
      box-shadow: none !important;
    }

    #closeFullscreen {

      right: 12px;

      color: #111;
      font-weight:700;
      box-shadow: 0 6px 18px rgba(16,24,40,0.12);
      cursor: pointer;

ound: #0f1724; display: none; overflow-y: auto; color: #e6eef6; }\n        #game-container { width:100%; max-width:1200px; margin: 0 auto; padding: 24px; }\n        .game-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }\n        .game-h1 { font-size:20px; margin:0; color:#06b6d4; }\n        .game-controls { display:flex; gap:8px; align-items:center; }\n        .game-btn { background:linear-gradient(90deg,#0ea5a4,#06b6d4); border:0; color:#042027; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:600; }\n        .game-btn-close { background: #ef4444; color: white; }\n        .game-layout { display:flex; gap:18px; align-items:flex-start; overflow-x:auto; padding-bottom:6px; }\n        .game-card { flex: 0 0 48%; min-width:320px; box-sizing:border-box; padding:12px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid rgba(255,255,255,0.03); max-height: calc(100vh - 180px); overflow:auto; }\n        .game-list { display:flex; flex-direction:column; gap:10px; }\n        .game-eng-item, .game-vie-item { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:10px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.03); color: #e6eef6; }\n        .game-eng-left { display:flex; align-items:center; gap:12px; flex: 0 0 220px; min-width:160px; }\n        .game-index { width:36px; height:36px; border-radius:8px; background:rgba(255,255,255,0.03); display:flex; align-items:center; justify-content:center; color:#94a3b8; font-weight:700; }\n        .game-slot { flex:1; display:flex; align-items:center; justify-content:flex-start; gap:10px; padding:12px 16px; border-radius:12px; background:rgba(255,255,255,0.01); border:2px dashed rgba(255,255,255,0.03); min-height:56px; transition:all 220ms ease; cursor:pointer; position:relative; overflow:visible; }\n        .game-slot .inner { position:relative; z-index:3; }\n        .game-slot.correct { padding-left:12px; font-size:15px; display:flex; align-items:center; border-style:solid; border-width:2px; background:linear-gradient(180deg, rgba(16,185,129,0.03), rgba(16,185,129,0.01)); }\n        .game-slot.correct::before { background: linear-gradient(90deg, rgba(16,185,129,0.9), rgba(96,165,250,0.06)); opacity:0.6; filter:blur(10px); }\n        .game-vie-list { display:flex; flex-wrap:wrap; gap:10px; padding-top:6px; }\n        .game-vie-item { cursor:grab; user-select:none; padding:8px 12px; border-radius:10px; background:linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border:1px solid rgba(255,255,255,0.03); }\n        .game-vie-item.dragging { opacity:0.5; transform:scale(0.98); }\n        .game-wrong { animation:shake 300ms; border-color:rgba(239,68,68,0.6); }\n        .game-badge { display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; background:rgba(255,255,255,0.02); color:#94a3b8; font-weight:600; }\n        .game-confetti { position:fixed; left:0; top:0; width:100%; height:100%; pointer-events:none; overflow:hidden; z-index:6000; }\n        .game-confetti .piece { position:absolute; width:10px; height:14px; opacity:0; animation:fall 1200ms linear forwards; }\n        .game-small { font-size:13px; color:#94a3b8; }\n        .flash-wrap { perspective:1200px; width:100%; max-width:520px; }\n        .flashcard { width:100%; height:140px; position:relative; transform-style:preserve-3d; transition:transform 600ms cubic-bezier(.2,.9,.3,1); border-radius:12px; cursor:pointer; }\n        .flashcard.flipped { transform:rotateY(180deg); }\n        .flash-face { position:absolute; inset:0; backface-visibility:hidden; border-radius:12px; display:flex; align-items:center; justify-content:center; padding:18px; font-size:18px; text-align:center; box-shadow: 0 6px 18px rgba(2,6,23,0.6); border:1px solid rgba(255,255,255,0.03); }\n        .flash-face.front { background:linear-gradient(180deg, rgba(6,182,212,0.08), rgba(96,165,250,0 2')\">(2)</span>  cutting-edge treatments in cardiology, oncology, and aesthetics, powered by stronger partnerships with global  <span class=\"gap-btn\" id=\"gap-1-3\" onclick=\"showGapOptions(event, '1', '3')\">(3)</span>  like The John Hopkins Hospital or Cleveland Clinic.  <span class=\"gap-btn\" id=\"gap-1-4\" onclick=\"showGapOptions(event, '1', '4')\">(4)</span>  our commitment to excellence, we provide seamless support with multilingual interpreters, tailored diets, and  <span class=\"gap-btn\" id=\"gap-1-5\" onclick=\"showGapOptions(event, '1', '5')\">(5)</span>  high-end services. Moreover, our advanced technology and compassionate care will deliver the best outcomes at affordable costs. Choose YouMec for a better and healthier version of you, backed by world-class expertise and personalized attention. Let's  <span class=\"gap-btn\" id=\"gap-1-6\" onclick=\"showGapOptions(event, '1', '6')\">(6)</span>  your strength and start your transformative medical journey from today!<br></div></div><div class=\"section-box\"><h3 class=\"section-title\">Part 2: Gap Fill / Cloze Test</h3><div class=\"gap-fill-text\">TIPS FOR SOLO TRAVELLING<br>For those intending to embark on a solo journey, careful preparation is essential to ensure both safety and the  <span class=\"gap-btn\" id=\"gap-2-7\" onclick=\"showGapOptions(event, '2', '7')\">(7)</span>  of authentic experiences. The first step is choosing a destination that is welcoming but not  <span class=\"gap-btn\" id=\"gap-2-8\" onclick=\"showGapOptions(event, '2', '8')\">(8)</span>  by mass tourism. Solo travelers might consider smaller, walkable towns that allow for easy navigation and deeper cultural immersion. Before departure, it is also advisable to share the itinerary with family or friends, download offline maps to reduce travel stress, and pack lightly to remain self- reliant. Once abroad, being mindful  <span class=\"gap-btn\" id=\"gap-2-9\" onclick=\"showGapOptions(event, '2', '9')\">(9)</span>  local customs, including dress codes, is crucial, as this not only ensures respect but also enriches the overall experience and fosters connections with locals. Upon arrival, travelers should seek  <span class=\"gap-btn\" id=\"gap-2-10\" onclick=\"showGapOptions(event, '2', '10')\">(10)</span>  from hostel staff. To safeguard finances, only one bank card should be carried, cash should be kept in separate pockets, and real-time location sharing should be avoided. Finally, travelers should consider  <span class=\"gap-btn\" id=\"gap-2-11\" onclick=\"showGapOptions(event, '2', '11')\">(11)</span>  local events or small group activities, which enables them to engage  <span class=\"gap-btn\" id=\"gap-2-12\" onclick=\"showGapOptions(event, '2', '12')\">(12)</span>  with other people while still uncovering hidden gems off the beaten path.<br></div></div><div class=\"section-box\"><h3 class=\"section-title\">Part 3: Sentence Rearrangement</h3><div style=\"margin-bottom:30px\"><strong>Question 13.</strong> Drag/Drop:<ul class=\"sortable-list\" id=\"sortable-13\"><li class=\"sortable-item\" draggable=\"true\" data-sid=\"a\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>a.</b> Customer: Could I get a matcha latte with salted cream on top, please?</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"b\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>b.</b> Customer: It's June, so I'm definitely treating myself to a cold one.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"c\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>c.</b> Barista: No problem! Do you want it iced or hot?</li></ul><button class=\"action-btn btn-primary\" onclick=\"checkOrder('13', 'a,c,b')\">Check</button><span id=\"fb-13\" style=\"margin-left:10px\"></span><div id=\"ans-13\" style=\"display:none;color:#22c55e;margin-top:5px\">Correct: a - c - b</div></div><div style=\"margin-bottom:30px\"><strong>Question 14.</strong> Drag/Drop:<ul class=\"sortable-list\" id=\"sortable-14\"><li class=\"sortable-item\" draggable=\"true\" data-sid=\"a\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>a.</b> Mia: Hey, have you started revising for the graduation exam yet?</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"b\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>b.</b> Sam: That'd be awesome. We could quiz each other and sort out the tricky topics.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"e\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>e.</b> Mia: Tell me about it! I'm freaking out over chemistry. Want to study together this weekend?</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"d\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>d.</b> Sam: Yeah, I've been hitting the books hard, especially for math. It's tougher than I thought!</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"c\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>c.</b> Mia: Perfect! Let's meet at my place on Saturday and power through those practice tests.</li></ul><button class=\"action-btn btn-primary\" onclick=\"checkOrder('14', 'a,d,e,b,c')\">Check</button><span id=\"fb-14\" style=\"margin-left:10px\"></span><div id=\"ans-14\" style=\"display:none;color:#22c55e;margin-top:5px\">Correct: a - d - e - b - c</div></div><div style=\"margin-bottom:30px\"><strong>Question 15.</strong> Drag/Drop:<ul class=\"sortable-list\" id=\"sortable-15\"><li class=\"sortable-item\" draggable=\"true\" data-sid=\"a\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>a.</b> We believe this event will foster community spirit and allow students to contribute meaningfully to Heart of Gold, helping many disadvantaged children get better access to healthcare.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"e\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>e.</b> For further information, I am available to meet at your convenience to discuss this further. Thank you for considering our request.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"c\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>c.</b> We commit to handling all logistics, including supervision and financial reporting, responsibly.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"d\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>d.</b> We propose holding this event on 15th December in the school's auditorium, aiming to showcase our students' musical talent for a worthy cause.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"b\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>b.</b> On behalf of the Music Club, I am writing to respectfully request your permission to organize a musical event on school premises to raise funds for Heart of Gold.</li></ul><button class=\"action-btn btn-primary\" onclick=\"checkOrder('15', 'b,d,a,c,e')\">Check</button><span id=\"fb-15\" style=\"margin-left:10px\"></span><div id=\"ans-15\" style=\"display:none;color:#22c55e;margin-top:5px\">Correct: b - d - a - c - e</div></div><div style=\"margin-bottom:30px\"><strong>Question 16.</strong> Drag/Drop:<ul class=\"sortable-list\" id=\"sortable-16\"><li class=\"sortable-item\" draggable=\"true\" data-sid=\"e\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>e.</b> The rise of social media has profoundly transformed how natural landmarks are discovered and experienced.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"b\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>b.</b> Once considered a hidden gem, known only to a few locals and accessible via an unmarked trail in the early 1990s, its visitor numbers have dramatically surged.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"c\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>c.</b> A prime example is Horseshoe Bend, a spectacular U-shaped curve in the Colorado River.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"d\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>d.</b> Social networking platforms, particularly Instagram, have acted as a powerful catalyst for this transformation.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"a\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>a.</b> However, this sudden exposure can be overwhelming, placing immense pressure on its delicate ecosystems and resources.</li></ul><button class=\"action-btn btn-primary\" onclick=\"checkOrder('16', 'e,c,b,d,a')\">Check</button><span id=\"fb-16\" style=\"margin-left:10px\"></span><div id=\"ans-16\" style=\"display:none;color:#22c55e;margin-top:5px\">Correct: e - c - b - d - a</div></div><div style=\"margin-bottom:30px\"><strong>Question 17.</strong> Drag/Drop:<ul class=\"sortable-list\" id=\"sortable-17\"><li class=\"sortable-item\" draggable=\"true\" data-sid=\"e\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>e.</b> As a result, more young people are seeking out non-traditional careers that allow for remote work and flexible schedules.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"c\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>c.</b> The rise of digital technologies has also created new jobs, especially in fields like IT, marketing, and online business.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"d\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>d.</b> This shift in the job market has led to a surge in specialized education and training, giving people a chance to pursue various career interests.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"a\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>a.</b> However, despite this increase in opportunities, many fields still lack sufficient training programs, especially in smaller towns.</li><li class=\"sortable-item\" draggable=\"true\" data-sid=\"b\"><span class=\"drag-handle\" style=\"color:#94a3b8;font-weight:bold;font-size:1.2em\">☰</span> <b>b.</b> Career paths have evolved dramatically over the years, with more options available than ever before.</li></ul><button class=\"action-btn btn-primary\" onclick=\"checkOrder('17', 'b,c,d,a,e')\">Check</button><span id=\"fb-17\" style=\"margin-left:10px\"></span><div id=\"ans-17\" style=\"display:none;color:#22c55e;margin-top:5px\">Correct: b - c - d - a - e</div></div></div><div class=\"section-box\"><h3 class=\"section-title\">Part 4: Gap Fill / Cloze Test</h3><div class=\"gap-fill-text\">Preserving the Night Sky: The Fight Against Light Pollution<br>At a time when interest in astronomy is on the increase, amateur astronomers  <span class=\"gap-btn\" id=\"gap-4-18\" onclick=\"showGapOptions(event, '4', '18')\">(18)</span> . The reason for this is that the night sky is gradually being lost due to light pollution,  <span class=\"gap-btn\" id=\"gap-4-19\" onclick=\"showGapOptions(event, '4', '19')\">(19)</span> . In response to this growing threat, the International Dark Sky Association has decided to award Dark Sky Reserve status to places that have so far escaped the adverse effects of light pollution.  <span class=\"gap-btn\" id=\"gap-4-20\" onclick=\"showGapOptions(event, '4', '20')\">(20)</span> . Up to now, only a handful of places have been granted Dark Sky Reserve Status, but there are plans for others to be added so that amateur astronomers can continue to enjoy the night sky just as much as their professional counterparts.  <span class=\"gap-btn\" id=\"gap-4-21\" onclick=\"showGapOptions(event, '4', '21')\">(21)</span> . Additionally, educational programs are also being developed to raise awareness among communities about the importance of reducing light pollution. If consistently supported by the governments and citizens,  <span class=\"gap-btn\" id=\"gap-4-22\" onclick=\"showGapOptions(event, '4', '22')\">(22)</span> .<br></div></div><div class=\"section-box\">\n                    <div class=\"section-header\">\n                        <h3 class=\"section-title\">Part 5: Reading</h3>\n                        <button class=\"fullscreen-btn\" onclick=\"toggleFullScreenReading(this)\">⛶ Full Screen</button>\n                    </div>\n                    <div class=\"reading-container\" id=\"reading-5\"><div class=\"reading-left\">The contemporary employment landscape is witnessing a notable shift in employee behavior, moving away from the previously prevalent trend of 'job hopping'. For years, frequent job changes were often perceived negatively, sometimes even <b>discrediting</b> an employee's commitment. However, recent data suggests a significant decline in voluntary resignations. This new phenomenon, termed 'job hugging', describes a situation where employees opt to remain in their current positions, effectively 'holding tight' to their jobs.<br><br><b>Statistics from the American labor market indicate a substantial decrease in the number of workers quitting their jobs compared to previous years, highlighting this evolving trend</b>. Data from 2024 shows that 39.6 million Americans resigned from their jobs, an 11% drop from 2023 and a significant 22% decrease compared to 2022. This sharp decline reflects a major shift in employee attitudes, with many individuals choosing to \"hug\" their current jobs rather than risk changing roles.<br><br>This hesitation to switch roles is primarily driven by shifting economic realities rather than increased corporate loyalty. Tougher economic conditions, including financial instability, widespread layoffs and a general fear of unemployment, have made job security a paramount concern for many. Consequently, the perceived risks associated with seeking new opportunities often outweigh the potential benefits, such as higher salaries or career advancement. Employees are, therefore, prioritizing stability within their existing companies over the uncertainty of the external job market.<br><br>A common characteristic of individuals engaged in 'job hugging' is a heightened <b>aversion</b> to risk- taking in their career decisions. <b>They</b> may continue in roles even when experiencing dissatisfaction, choosing to endure familiar challenges rather than venturing into the unknown. This often involves valuing job security above personal growth or exploring new career paths. For these employees, the fear of a worse outcome in a new environment often compels them to stay put, even when other opportunities might exist. This pattern suggests a strategic decision to minimize exposure to market volatility.<br><br></div><div class=\"reading-right\"><div class=\"mcq-question\"><b>Question 23.</b> The word “discrediting” in paragraph 1 is CLOSEST in meaning to ____________.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q23\" value=\"A\" onchange=\"checkMCQ('5', '23', 'A')\"> A. displacing</label><label><input type=\"radio\" name=\"q23\" value=\"B\" onchange=\"checkMCQ('5', '23', 'B')\"> B. confirming</label><label><input type=\"radio\" name=\"q23\" value=\"C\" onchange=\"checkMCQ('5', '23', 'C')\"> C. degrading</label><label><input type=\"radio\" name=\"q23\" value=\"D\" onchange=\"checkMCQ('5', '23', 'D')\"> D. undermining</label></div><div id=\"res-5-23\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 24.</b> Which of the following best paraphrases the underlined sentence in paragraph 1?\n“Statistics from the American labor market indicate a substantial decrease in the number of workers quitting their jobs compared to previous years, highlighting this evolving trend.”<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q24\" value=\"A\" onchange=\"checkMCQ('5', '24', 'A')\"> A. The American labor market shows that fewer people are leaving their jobs now than before, reflecting a new trend.</label><label><input type=\"radio\" name=\"q24\" value=\"B\" onchange=\"checkMCQ('5', '24', 'B')\"> B. The evolving trend in the American labor market is a decrease in job hugging due to new statistics recorded over the previous years.</label><label><input type=\"radio\" name=\"q24\" value=\"C\" onchange=\"checkMCQ('5', '24', 'C')\"> C. In the last couple of years, the number of workers quitting jobs has soared, indicating a new trend in the American labor market.</label><label><input type=\"radio\" name=\"q24\" value=\"D\" onchange=\"checkMCQ('5', '24', 'D')\"> D. There are more workers deciding to commit to their jobs in the American labor market, changing the employment trend.</label></div><div id=\"res-5-24\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 25.</b> Which of the following is NOT mentioned in paragraph 3 as a factor contributing to job hugging?<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q25\" value=\"A\" onchange=\"checkMCQ('5', '25', 'A')\"> A. widespread layoffs</label><label><input type=\"radio\" name=\"q25\" value=\"B\" onchange=\"checkMCQ('5', '25', 'B')\"> B. fear of unemployment</label><label><input type=\"radio\" name=\"q25\" value=\"C\" onchange=\"checkMCQ('5', '25', 'C')\"> C. career advancement</label><label><input type=\"radio\" name=\"q25\" value=\"D\" onchange=\"checkMCQ('5', '25', 'D')\"> D. financial instability</label></div><div id=\"res-5-25\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 26.</b> Which of the following is TRUE according to paragraph 3?<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q26\" value=\"A\" onchange=\"checkMCQ('5', '26', 'A')\"> A. Job security is less important than personal growth for job huggers</label><label><input type=\"radio\" name=\"q26\" value=\"B\" onchange=\"checkMCQ('5', '26', 'B')\"> B. Job huggers often leave their jobs if they are dissatisfied.</label><label><input type=\"radio\" name=\"q26\" value=\"C\" onchange=\"checkMCQ('5', '26', 'C')\"> C. Job huggers are usually eager to take risks in their careers.</label><label><input type=\"radio\" name=\"q26\" value=\"D\" onchange=\"checkMCQ('5', '26', 'D')\"> D. Job huggers may stay in roles despite feeling unhappy.</label></div><div id=\"res-5-26\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 27.</b> The word “aversion” in paragraph 4 is OPPOSITE in meaning to ____________.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q27\" value=\"A\" onchange=\"checkMCQ('5', '27', 'A')\"> A. commitment</label><label><input type=\"radio\" name=\"q27\" value=\"B\" onchange=\"checkMCQ('5', '27', 'B')\"> B. preference</label><label><input type=\"radio\" name=\"q27\" value=\"C\" onchange=\"checkMCQ('5', '27', 'C')\"> C. trend</label><label><input type=\"radio\" name=\"q27\" value=\"D\" onchange=\"checkMCQ('5', '27', 'D')\"> D. negligence</label></div><div id=\"res-5-27\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 28.</b> The word “They” in paragraph 3 refers to ____________.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q28\" value=\"A\" onchange=\"checkMCQ('5', '28', 'A')\"> A. familiar challenges</label><label><input type=\"radio\" name=\"q28\" value=\"B\" onchange=\"checkMCQ('5', '28', 'B')\"> B. individuals</label><label><input type=\"radio\" name=\"q28\" value=\"C\" onchange=\"checkMCQ('5', '28', 'C')\"> C. career decisions</label><label><input type=\"radio\" name=\"q28\" value=\"D\" onchange=\"checkMCQ('5', '28', 'D')\"> D. career paths</label></div><div id=\"res-5-28\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 29.</b> Which paragraph provides data to show the increasing trend of “job hugging”?<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q29\" value=\"A\" onchange=\"checkMCQ('5', '29', 'A')\"> A. Paragraph 4</label><label><input type=\"radio\" name=\"q29\" value=\"B\" onchange=\"checkMCQ('5', '29', 'B')\"> B. Paragraph 1</label><label><input type=\"radio\" name=\"q29\" value=\"C\" onchange=\"checkMCQ('5', '29', 'C')\"> C. Paragraph 3</label><label><input type=\"radio\" name=\"q29\" value=\"D\" onchange=\"checkMCQ('5', '29', 'D')\"> D. Paragraph 2</label></div><div id=\"res-5-29\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 30.</b> Which paragraph mentions the definition of “job hugging”?<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q30\" value=\"A\" onchange=\"checkMCQ('5', '30', 'A')\"> A. Paragraph 1</label><label><input type=\"radio\" name=\"q30\" value=\"B\" onchange=\"checkMCQ('5', '30', 'B')\"> B. Paragraph 2</label><label><input type=\"radio\" name=\"q30\" value=\"C\" onchange=\"checkMCQ('5', '30', 'C')\"> C. Paragraph 3</label><label><input type=\"radio\" name=\"q30\" value=\"D\" onchange=\"checkMCQ('5', '30', 'D')\"> D. Paragraph 4</label></div><div id=\"res-5-30\" style=\"margin-top:5px\"></div></div></div></div></div><div class=\"section-box\">\n                    <div class=\"section-header\">\n                        <h3 class=\"section-title\">Part 6: Reading</h3>\n                        <button class=\"fullscreen-btn\" onclick=\"toggleFullScreenReading(this)\">⛶ Full Screen</button>\n                    </div>\n                    <div class=\"reading-container\" id=\"reading-6\"><div class=\"reading-left\">The rapid proliferation of artificial intelligence (AI) tools, particularly generative AI, has sparked a profound debate concerning their impact on human cognition. While celebrated for their capacity to enhance productivity and automate complex tasks, a growing body of research suggests that an over- reliance on these technologies might inadvertently blunt our thinking skills. This <b>apprehension</b> echoes historical concerns, such as Socrates's distrust of the written word, which he feared would diminish memory and intellectual rigor. Though the great philosopher's specific fears about writing proved unfounded, the underlying anxiety about new cognitive technologies and their potential to reshape our mental faculties persists in the age of AI.<br><br>Empirical studies are now providing concrete evidence for these contemporary worries. Researchers have observed that even seasoned professionals tend to disengage their critical thinking skills when routinely using generative AI for tasks requiring analysis or synthesis. Furthermore, excessive dependence on AI during learning processes has been linked to reduced brain connectivity and a decrease in the memorability of information. This phenomenon is often attributed to a maladaptive form of \"cognitive offloading,\" where instead of using AI to free up mental resources for higher-order thinking, individuals delegate fundamental cognitive processes entirely. <b>Such delegation, when unchecked, hinders the development and maintenance of essential mental muscles, potentially transforming our minds into mere passive recipients rather than active processors of information.</b><br><br><b>[I]</b> However, the narrative is not entirely one of decline. Many experts propose that AI, when leveraged judiciously, can serve as a powerful tool for human intelligence. The key lies in shifting from passive consumption to active, critical engagement. <b>[II] </b>Instead of asking AI for complete answers, users can employ it to generate diverse perspectives, identify potential biases, or even challenge their own assumptions. This approach transforms AI from a crutch into a sparring partner, fostering a dynamic interaction that can sharpen reasoning and deepen understanding. <b>[III]</b> Strategies include fact-checking AI outputs, iteratively refining prompts to encourage deeper processing, and dedicating mental effort to understanding why AI provides certain information. The challenge, therefore, is not to reject AI, but to cultivate a mindful approach to its integration into our daily lives and professional practices. <b>[IV]</b><br><br>By understanding the mechanisms of cognitive offloading and consciously designing interactions that promote active learning and critical evaluation, we can harness AI's immense potential without <b>succumbing to its pitfalls</b>. This requires a concerted effort from individuals, educators, and developers to foster \"AI literacy\" - the ability to effectively and ethically engage with AI technologies. Ultimately, the future impact of AI on human cognition will be less about the technology's inherent nature and more about how we choose to interact with it.<br><br></div><div class=\"reading-right\"><div class=\"mcq-question\"><b>Question 31.</b> The author mentions Socrates's historical concerns in paragraph 1 primarily to ____________.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q31\" value=\"A\" onchange=\"checkMCQ('6', '31', 'A')\"> A. highlight the philosophical debate between ancient and modern thinkers</label><label><input type=\"radio\" name=\"q31\" value=\"B\" onchange=\"checkMCQ('6', '31', 'B')\"> B. prove that historical anxieties about technology are always misplaced</label><label><input type=\"radio\" name=\"q31\" value=\"C\" onchange=\"checkMCQ('6', '31', 'C')\"> C. suggest that writing, like AI, ultimately harms human memory</label><label><input type=\"radio\" name=\"q31\" value=\"D\" onchange=\"checkMCQ('6', '31', 'D')\"> D. demonstrate a constant fear surrounding innovative cognitive technologies</label></div><div id=\"res-6-31\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 32.</b> Which of the following best summarizes the main idea of paragraph 2?<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q32\" value=\"A\" onchange=\"checkMCQ('6', '32', 'A')\"> A. Experienced professionals are more susceptible to the negative cognitive effects of AI than other people due to the nature of their work.</label><label><input type=\"radio\" name=\"q32\" value=\"B\" onchange=\"checkMCQ('6', '32', 'B')\"> B. Empirical evidence suggests over-reliance on AI can impair critical thinking and memory due to improper cognitive offloading.</label><label><input type=\"radio\" name=\"q32\" value=\"C\" onchange=\"checkMCQ('6', '32', 'C')\"> C. It has been argued among researchers whether AI tools are inherently detrimental to brain connectivity and memory formation when used constantly.</label><label><input type=\"radio\" name=\"q32\" value=\"D\" onchange=\"checkMCQ('6', '32', 'D')\"> D. Cognitive offloading is the use of external tools such as AI to reduce the mental effort needed for a task, thereby lowering cognitive load.</label></div><div id=\"res-6-32\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 33.</b> Which of the following is NOT mentioned in the passage as a potential negative consequence of using generative AI excessively?<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q33\" value=\"A\" onchange=\"checkMCQ('6', '33', 'A')\"> A. Reduced brain connectivity.</label><label><input type=\"radio\" name=\"q33\" value=\"B\" onchange=\"checkMCQ('6', '33', 'B')\"> B. Lowered interpersonal competence.</label><label><input type=\"radio\" name=\"q33\" value=\"C\" onchange=\"checkMCQ('6', '33', 'C')\"> C. Weakened mental muscles</label><label><input type=\"radio\" name=\"q33\" value=\"D\" onchange=\"checkMCQ('6', '33', 'D')\"> D. Decreased memorability of information.</label></div><div id=\"res-6-33\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 34.</b> The phrase “apprehension” in paragraph 1 most likely means ____________.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q34\" value=\"A\" onchange=\"checkMCQ('6', '34', 'A')\"> A. worry</label><label><input type=\"radio\" name=\"q34\" value=\"B\" onchange=\"checkMCQ('6', '34', 'B')\"> B. uncertainty</label><label><input type=\"radio\" name=\"q34\" value=\"C\" onchange=\"checkMCQ('6', '34', 'C')\"> C. adversity</label><label><input type=\"radio\" name=\"q34\" value=\"D\" onchange=\"checkMCQ('6', '34', 'D')\"> D. argument</label></div><div id=\"res-6-34\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 35.</b> The word “their” in paragraph 3 refers to ____________.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q35\" value=\"A\" onchange=\"checkMCQ('6', '35', 'A')\"> A. biases'</label><label><input type=\"radio\" name=\"q35\" value=\"B\" onchange=\"checkMCQ('6', '35', 'B')\"> B. professionals'</label><label><input type=\"radio\" name=\"q35\" value=\"C\" onchange=\"checkMCQ('6', '35', 'C')\"> C. users'</label><label><input type=\"radio\" name=\"q35\" value=\"D\" onchange=\"checkMCQ('6', '35', 'D')\"> D. perspectives'</label></div><div id=\"res-6-35\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 36.</b> Which of the following best paraphrases the underlined sentence in paragraph 2?\n“Such delegation, when unchecked, hinders the development and maintenance of essential mental muscles, potentially transforming our minds into mere passive recipients rather than active processors of information.”<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q36\" value=\"A\" onchange=\"checkMCQ('6', '36', 'A')\"> A. If left unregulated, delegating tasks to AI might prevent us from staying active, causing the brain to lose certain cognitive functions assisting with processing information.</label><label><input type=\"radio\" name=\"q36\" value=\"B\" onchange=\"checkMCQ('6', '36', 'B')\"> B. The uncontrolled usage of AI for mental tasks will inevitably impede cognitive growth, making individuals less active in processing information.</label><label><input type=\"radio\" name=\"q36\" value=\"C\" onchange=\"checkMCQ('6', '36', 'C')\"> C. Giving mental tasks to AI, without proper oversight, can weaken cognitive development, leading to a state where minds passively accept information instead of actively engaging with it.</label><label><input type=\"radio\" name=\"q36\" value=\"D\" onchange=\"checkMCQ('6', '36', 'D')\"> D. The unchecked delegation of mental responsibilities to AI has been reported to lead to a decline in cognitive functions, turning individuals into passive receivers of data.</label></div><div id=\"res-6-36\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 37.</b> The phrase “succumbing to its pitfalls” in paragraph 4 is OPPOSITE in meaning to ____________.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q37\" value=\"A\" onchange=\"checkMCQ('6', '37', 'A')\"> A. falling into traps</label><label><input type=\"radio\" name=\"q37\" value=\"B\" onchange=\"checkMCQ('6', '37', 'B')\"> B. overcoming obstacles</label><label><input type=\"radio\" name=\"q37\" value=\"C\" onchange=\"checkMCQ('6', '37', 'C')\"> C. giving in to hazards</label><label><input type=\"radio\" name=\"q37\" value=\"D\" onchange=\"checkMCQ('6', '37', 'D')\"> D. yielding to challenges</label></div><div id=\"res-6-37\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 38.</b> It can be inferred from the passage that developing ‘AI literacy’ would primarily involve ____________.<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q38\" value=\"A\" onchange=\"checkMCQ('6', '38', 'A')\"> A. focusing solely on the technical aspects of AI development and programming</label><label><input type=\"radio\" name=\"q38\" value=\"B\" onchange=\"checkMCQ('6', '38', 'B')\"> B. learning to critically evaluate, actively engage with, and ethically use AI technologies</label><label><input type=\"radio\" name=\"q38\" value=\"C\" onchange=\"checkMCQ('6', '38', 'C')\"> C. passively accepting AI outputs to maximize efficiency and productivity</label><label><input type=\"radio\" name=\"q38\" value=\"D\" onchange=\"checkMCQ('6', '38', 'D')\"> D. completely avoiding the use of generative AI tools in academic and professional settings</label></div><div id=\"res-6-38\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 39.</b> Where in the passage does the following sentence best fit?\n“This means that users must consciously adopt strategies that encourage active thought rather than simply accepting AI-generated content.”<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q39\" value=\"A\" onchange=\"checkMCQ('6', '39', 'A')\"> A. [III]</label><label><input type=\"radio\" name=\"q39\" value=\"B\" onchange=\"checkMCQ('6', '39', 'B')\"> B. [IV]</label><label><input type=\"radio\" name=\"q39\" value=\"C\" onchange=\"checkMCQ('6', '39', 'C')\"> C. [II]</label><label><input type=\"radio\" name=\"q39\" value=\"D\" onchange=\"checkMCQ('6', '39', 'D')\"> D. [I]</label></div><div id=\"res-6-39\" style=\"margin-top:5px\"></div></div><div class=\"mcq-question\"><b>Question 40.</b> Which of the following best summarizes the main idea of the passage?<div class=\"mcq-options\"><label><input type=\"radio\" name=\"q40\" value=\"A\" onchange=\"checkMCQ('6', '40', 'A')\"> A. Cognitive offloading, a millennial-old strategy, is now being misused with AI, requiring a complete overhaul of educational systems in order to prevent people from over-relying on it.</label><label><input type=\"radio\" name=\"q40\" value=\"B\" onchange=\"checkMCQ('6', '40', 'B')\"> B. The debate surrounding AI's impact on human cognition is complex, but current research has supported its negative effects, urging people to refrain from this risky technology.</label><label><input type=\"radio\" name=\"q40\" value=\"C\" onchange=\"checkMCQ('6', '40', 'C')\"> C. While AI presents risks to cognitive function through over-reliance, mindful and active engagement can transform it into a powerful tool for intellectual augmentation.</label><label><input type=\"radio\" name=\"q40\" value=\"D\" onchange=\"checkMCQ('6', '40', 'D')\"> D. Generative AI tools are fundamentally detrimental to human cognitive abilities, echoing ancient philosophical warnings.</label></div><div id=\"res-6-40\" style=\"margin-top:5px\"></div></div></div></div></div>\n        </div>\n        <div id=\"gap-popover\" class=\"popover\"></div><div class=\"overlay\" onclick=\"closeVocabModal()\"></div>\n        <div class=\"vocab-modal\" id=\"vocab-modal\"><div class=\"vocab-header\" id=\"v-word\"></div><div class=\"vocab-body\"><div style=\"font-weight:bold;margin-bottom:10px\" id=\"v-meaning\"></div><div style=\"font-style:italic;color:#666;margin-bottom:10px\" id=\"v-synonym\"></div><div style=\"background:#f1f5f9;padding:10px;border-left:4px solid #22c55e\" id=\"v-example\"></div></div></div>\n        <div id=\"vocab-game-overlay\">\n    <div id=\"game-container\">\n        <header class=\"game-header\">\n            <h1 class=\"game-h1\">Vocabulary Matching Game</h1>\n            <div class=\"game-controls\"><div class=\"game-badge\" id=\"score\">Đúng: 0 / 0</div><button class=\"game-btn\" id=\"shuffleBtn\">Trộn</button><button class=\"game-btn\" id=\"resetBtn\">Làm lại</button><button class=\"game-btn game-btn-close\" onclick=\"closeVocabGame()\">❌ Close</button></div>\n        </header>\n        <section class=\"game-card\" style=\"margin-bottom:12px;\">\n            <h3 style=\"margin-top:0; color:var( 4-13\":\"B\",\"4-14\":\"A\",\"4-15\":\"B\",\"4-16\":\"D\",\"4-17\":\"A\",\"4-18\":\"D\",\"4-19\":\"A\",\"4-20\":\"A\",\"4-21\":\"D\",\"4-22\":\"B\",\"4-23\":\"D\",\"4-24\":\"A\",\"4-25\":\"C\",\"4-26\":\"D\",\"4-27\":\"B\",\"4-28\":\"B\",\"4-29\":\"D\",\"4-30\":\"A\",\"4-31\":\"D\",\"4-32\":\"B\",\"4-33\":\"B\",\"4-34\":\"A\",\"4-35\":\"C\",\"4-36\":\"C\",\"4-37\":\"B\",\"4-38\":\"B\",\"4-39\":\"C\",\"4-40\":\"C\",\"5-1\":\"A\",\"5-2\":\"C\",\"5-3\":\"C\",\"5-4\":\"B\",\"5-5\":\"D\",\"5-6\":\"A\",\"5-7\":\"C\",\"5-8\":\"B\",\"5-9\":\"A\",\"5-10\":\"D\",\"5-11\":\"B\",\"5-12\":\"B\",\"5-13\":\"B\",\"5-14\":\"A\",\"5-15\":\"B\",\"5-16\":\"D\",\"5-17\":\"A\",\"5-18\":\"D\",\"5-19\":\"A\",\"5-20\":\"A\",\"5-21\":\"D\",\"5-22\":\"B\",\"5-23\":\"D\",\"5-24\":\"A\",\"5-25\":\"C\",\"5-26\":\"D\",\"5-27\":\"B\",\"5-28\":\"B\",\"5-29\":\"D\",\"5-30\":\"A\",\"5-31\":\"D\",\"5-32\":\"B\",\"5-33\":\"B\",\"5-34\":\"A\",\"5-35\":\"C\",\"5-36\":\"C\",\"5-37\":\"B\",\"5-38\":\"B\",\"5-39\":\"C\",\"5-40\":\"C\",\"6-1\":\"A\",\"6-2\":\"C\",\"6-3\":\"C\",\"6-4\":\"B\",\"6-5\":\"D\",\"6-6\":\"A\",\"6-7\":\"C\",\"6-8\":\"B\",\"6-9\":\"A\",\"6-10\":\"D\",\"6-11\":\"B\",\"6-12\":\"B\",\"6-13\":\"B\",\"6-14\":\"A\",\"6-15\":\"B\",\"6-16\":\"D\",\"6-17\":\"A\",\"6-18\":\"D\",\"6-19\":\"A\",\"6-20\":\"A\",\"6-21\":\"D\",\"6-22\":\"B\",\"6-23\":\"D\",\"6-24\":\"A\",\"6-25\":\"C\",\"6-26\":\"D\",\"6-27\":\"B\",\"6-28\":\"B\",\"6-29\":\"D\",\"6-30\":\"A\",\"6-31\":\"D\",\"6-32\":\"B\",\"6-33\":\"B\",\"6-34\":\"A\",\"6-35\":\"C\",\"6-36\":\"C\",\"6-37\":\"B\",\"6-38\":\"B\",\"6-39\":\"C\",\"6-40\":\"C\"},\"gapOptions\":{\"1-1\":{\"A\":\"unrivaled\",\"B\":\"unbothered\",\"C\":\"underscored\",\"D\":\"underlined\"},\"1-2\":{\"A\":\"much\",\"B\":\"few\",\"C\":\"many\",\"D\":\"a little\"},\"1-3\":{\"A\":\"founders\",\"B\":\"initiators\",\"C\":\"giants\",\"D\":\"bosses\"},\"1-4\":{\"A\":\"In comparison with\",\"B\":\"In line with\",\"C\":\"In place of\",\"D\":\"In search of\"},\"1-5\":{\"A\":\"the other\",\"B\":\"the others\",\"C\":\"another\",\"D\":\"other\"},\"1-6\":{\"A\":\"build up\",\"B\":\"turn up\",\"C\":\"buckle up\",\"D\":\"glow up\"},\"2-7\":{\"A\":\"chase\",\"B\":\"hunt\",\"C\":\"pursuit\",\"D\":\"purchase\"},\"2-8\":{\"A\":\"mitigated\",\"B\":\"overwhelmed\",\"C\":\"enhanced\",\"D\":\"worsened\"},\"2-9\":{\"A\":\"of\",\"B\":\"with\",\"C\":\"for\",\"D\":\"in\"},\"2-10\":{\"A\":\"safety advice practical\",\"B\":\"advice safety practical\",\"C\":\"practical advice safety\",\"D\":\"practical safety advice\"},\"2-11\":{\"A\":\"join\",\"B\":\"joining\",\"C\":\"to join\",\"D\":\"to joining\"},\"2-12\":{\"A\":\"mean\",\"B\":\"meaningfully\",\"C\":\"meaning\",\"D\":\"meaningful\"},\"4-18\":{\"A\":\"those who observe the Milky Way from their back gardens face a tough challenge\",\"B\":\"from their back gardens, experiencing difficulty growing in observing the Milky Way\",\"C\":\"who struggle with watching the Milky Way clearly from their back gardens\",\"D\":\"are finding it increasingly difficult to observe the Milky Way from their back gardens\"},\"4-19\":{\"A\":\"threatening to make astronomy a privilege that only scientists can enjoy\",\"B\":\"that poses a threat to limit astronomy as a benefit exclusive to scientists\",\"C\":\"to make astronomy a privilege reserved just for scientific professionals\",\"D\":\"potentially restricts astronomy to an enjoyment available only to scientists\"},\"4-20\":{\"A\":\"When such a place is given this award, in recognition of its exceptional night skies, it is protected by regulations to prevent light pollution\",\"B\":\"Furthermore, this award can serve as a marketing tactic to draw in more investors for developing lighting equipment, thereby increasing the number of tourists\",\"C\":\"After receiving this award in recognition of its remarkable night skies, such a location remains susceptible to light pollution because of inadequate infrastructure\",\"D\":\"This recognition serves as proof of its exceptional night skies, notwithstanding its being protected by local authorities from light pollution\"},\"4-21\":{\"A\":\"Some cities' authorities in the world have already implemented very strict lighting rules: outdoor lights must be fully shielded so light doesn't go upward\",\"B\":\"This raises the question of whether it is important to put efforts into preserving the dark sky while cities continue to expand at a fast pace\",\"C\":\"In order to protect the dark sky from disappearing from the public's eyes, it is more important than ever to encourage cities to expand their areas\",\"D\":\"These efforts are crucial as increasing urbanization continues to worsen the problem, making dark sky preservation a global priority\"},\"4-22\":{\"A\":\"future generations will also be able to marvel at the stars, thanks to this initiative\",\"B\":\"these initiatives will ensure that future generations can also marvel at the stars\",\"C\":\"the ability to marvel at the stars for future generations is a key goal of these initiatives\",\"D\":\"the stars can be marveled from anywhere for future generations\"}},\"vocabMap\":{},\"htmlContent\":\"<div class=\\\"section-box\\\"><h3 class=\\\"section-title\\\">Part 1: Gap Fill / Cloze Test</h3><div class=\\\"gap-fill-text\\\">Your Journey to World-Class Healthcare Starts with YouMec! Discover a superior healthcare experience at YouMec International Hospital, an  <span class=\\\"gap-btn\\\" id=\\\"gap-1-1\\\" onclick=\\\"showGapOptions(event, '1', '1')\\\">(1)</span>  leader in medical tourism! Our JCI- accredited facilities offer  <span class=\\\"gap-btn\\\" id=\\\"gap-1-2\\\" onclick=\\\"showGapOptions(event, '1', '2')\\\">(2)</span>  cutting-edge treatments in cardiology, oncology, and aesthetics, powered by stronger partnerships with global  <span class=\\\"gap-btn\\\" id=\\\"gap-1-3\\\" onclick=\\\"showGapOptions(event, '1', '3')\\\">(3)</span>  like The John Hopkins Hospital or Cleveland Clinic.  <span class=\\\"gap-btn\\\" id=\\\"gap-1-4\\\" onclick=\\\"showGapOptions(event, '1', '4')\\\">(4)</span>  our commitment to excellence, we provide seamless support with multilingual interpreters, tailored diets, and  <span class=\\\"gap-btn\\\" id=\\\"gap-1-5\\\" onclick=\\\"showGapOptions(event, '1', '5')\\\">(5)</span>  high-end services. Moreover, our advanced technology and compassionate care will deliver the best outcomes at affordable costs. Choose YouMec for a better and healthier version of you, backed by world-class expertise and personalized attention. Let's  <span class=\\\"gap-btn\\\" id=\\\"gap-1-6\\\" onclick=\\\"showGapOptions(event, '1', '6')\\\">(6)</span>  your strength and start your transformative medical journey from today!<br></div></div><div class=\\\"section-box\\\"><h3 class=\\\"section-title\\\">Part 2: Gap Fill / Cloze Test</h3><div class=\\\"gap-fill-text\\\">TIPS FOR SOLO TRAVELLING<br>For those intending to embark on a solo journey, careful preparation is essential to ensure both safety and the  <span class=\\\"gap-btn\\\" id=\\\"gap-2-7\\\" onclick=\\\"showGapOptions(event, '2', '7')\\\">(7)</span>  of authentic experiences. The first step is choosing a destination that is welcoming but not  <span class=\\\"gap-btn\\\" id=\\\"gap-2-8\\\" onclick=\\\"showGapOptions(event, '2', '8')\\\">(8)</span>  by mass tourism. Solo travelers might consider smaller, walkable towns that allow for easy navigation and deeper cultural immersion. Before departure, it is also advisable to share the itinerary with family or friends, download offline maps to reduce travel stress, and pack lightly to remain self- reliant. Once abroad, being mindful  <span class=\\\"gap-btn\\\" id=\\\"gap-2-9\\\" onclick=\\\"showGapOptions(event, '2', '9')\\\">(9)</span>  local customs, including dress codes, is crucial, as this not only ensures respect but also enriches the overall experience and fosters connections with locals. Upon arrival, travelers should seek  <span class=\\\"gap-btn\\\" id=\\\"gap-2-10\\\" onclick=\\\"showGapOptions(event, '2', '10')\\\">(10)</span>  from hostel staff. To safeguard finances, only one bank card should be carried, cash should be kept in separate pockets, and real-time location sharing should be avoided. Finally, travelers should consider  <span class=\\\"gap-btn\\\" id=\\\"gap-2-11\\\" onclick=\\\"showGapOptions(event, '2', '11')\\\">(11)</span>  local events or small group activities, which enables them to engage  <span class=\\\"gap-btn\\\" id=\\\"gap-2-12\\\" onclick=\\\"showGapOptions(event, '2', '12')\\\">(12)</span>  with other people while still uncovering hidden gems off the beaten path.<br></div></div><div class=\\\"section-box\\\"><h3 class=\\\"section-title\\\">Part 3: Sentence Rearrangement</h3><div style=\\\"margin-bottom:30px\\\"><strong>Question 13.</strong> Drag/Drop:<ul class=\\\"sortable-list\\\" id=\\\"sortable-13\\\"><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"a\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>a.</b> Customer: Could I get a matcha latte with salted cream on top, please?</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"b\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>b.</b> Customer: It's June, so I'm definitely treating myself to a cold one.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"c\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>c.</b> Barista: No problem! Do you want it iced or hot?</li></ul><button class=\\\"action-btn btn-primary\\\" onclick=\\\"checkOrder('13', 'a,c,b')\\\">Check</button><span id=\\\"fb-13\\\" style=\\\"margin-left:10px\\\"></span><div id=\\\"ans-13\\\" style=\\\"display:none;color:#22c55e;margin-top:5px\\\">Correct: a - c - b</div></div><div style=\\\"margin-bottom:30px\\\"><strong>Question 14.</strong> Drag/Drop:<ul class=\\\"sortable-l =\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>e.</b> The rise of social media has profoundly transformed how natural landmarks are discovered and experienced.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"b\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>b.</b> Once considered a hidden gem, known only to a few locals and accessible via an unmarked trail in the early 1990s, its visitor numbers have dramatically surged.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"c\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>c.</b> A prime example is Horseshoe Bend, a spectacular U-shaped curve in the Colorado River.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"d\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>d.</b> Social networking platforms, particularly Instagram, have acted as a powerful catalyst for this transformation.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"a\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>a.</b> However, this sudden exposure can be overwhelming, placing immense pressure on its delicate ecosystems and resources.</li></ul><button class=\\\"action-btn btn-primary\\\" onclick=\\\"checkOrder('16', 'e,c,b,d,a')\\\">Check</button><span id=\\\"fb-16\\\" style=\\\"margin-left:10px\\\"></span><div id=\\\"ans-16\\\" style=\\\"display:none;color:#22c55e;margin-top:5px\\\">Correct: e - c - b - d - a</div></div><div style=\\\"margin-bottom:30px\\\"><strong>Question 17.</strong> Drag/Drop:<ul class=\\\"sortable-list\\\" id=\\\"sortable-17\\\"><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"e\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>e.</b> As a result, more young people are seeking out non-traditional careers that allow for remote work and flexible schedules.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"c\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>c.</b> The rise of digital technologies has also created new jobs, especially in fields like IT, marketing, and online business.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"d\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>d.</b> This shift in the job market has led to a surge in specialized education and training, giving people a chance to pursue various career interests.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"a\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>a.</b> However, despite this increase in opportunities, many fields still lack sufficient training programs, especially in smaller towns.</li><li class=\\\"sortable-item\\\" draggable=\\\"true\\\" data-sid=\\\"b\\\"><span class=\\\"drag-handle\\\" style=\\\"color:#94a3b8;font-weight:bold;font-size:1.2em\\\">☰</span> <b>b.</b> Career paths have evolved dramatically over the years, with more options available than ever before.</li></ul><button class=\\\"action-btn btn-primary\\\" onclick=\\\"checkOrder('17', 'b,c,d,a,e')\\\">Check</button><span id=\\\"fb-17\\\" style=\\\"margin-left:10px\\\"></span><div id=\\\"ans-17\\\" style=\\\"display:none;color:#22c55e;margin-top:5px\\\">Correct: b - c - d - a - e</div></div></div><div class=\\\"section-box\\\"><h3 class=\\\"section-title\\\">Part 4: Gap Fill / Cloze Test</h3><div class=\\\"gap-fill-text\\\">Preserving the Night Sky: The Fight Against Light Pollution<br>At a time when interest in astronomy is on the increase, amateur astronomers  <span class=\\\"gap-btn\\\" id=\\\"gap-4-18\\\" onclick=\\\"showGapOptions(event, '4', '18')\\\">(18)</span> . The reason for this is that the night sky is gradually being lost due to light pollution,  <span class=\\\"gap-btn\\\" id=\\\"gap-4-19\\\" onclick=\\\"showGapOptions(event, '4', '19')\\\">(19)</span> . In response to this growing threat, the International Dark Sky Association has decided to award Dark Sky Reserve status to places that have so far escaped the adverse effects of light pollution.  <span class=\\\"gap-btn\\\" id=\\\"gap-4-20\\\" onclick=\\\"showGapOptions(event, '4', '20')\\\">(20)</span> . Up to now, only a handful of places have been granted Dark Sky Reserve Status, but there are plans for others to be added so that amateur astronomers can continue to enjoy the night sky just as much as their professional counterparts.  <span class=\\\"gap-btn\\\" id=\\\"gap-4-21\\\" onclick=\\\"showGapOptions(event, '4', '21')\\\">(21)</span> . Additionally, educational programs are also being developed to raise awareness among communities about the importance of reducing light pollution. If consistently supported by the governments and citizens,  <span class=\\\"gap-btn\\\" id=\\\"gap-4-22\\\" onclick=\\\"showGapOptions(event, '4', '22')\\\">(22)</span> .<br></div></div><div class=\\\"section-box\\\">\\n                    <div class=\\\"section-header\\\">\\n                        <h3 class=\\\"section-title\\\">Part 5: Reading</h3>\\n                        <button class=\\\"fullscreen-btn\\\" onclick=\\\"toggleFullScreenReading(this)\\\">⛶ Full Screen</button>\\n                    </div>\\n                    <div class=\\\"reading-container\\\" id=\\\"reading-5\\\"><div class=\\\"reading-left\\\">The contemporary employment landscape is witnessing a notable shift in employee behavior, moving away from the previously prevalent trend of 'job hopping'. For years, frequent job changes were often perceived negatively, sometimes even <b>discrediting</b> an employee's commitment. However, recent data suggests a significant decline in voluntary resignations. This new phenomenon, termed 'job hugging', describes a situation where employees opt to remain in their current positions, effectively 'holding tight' to their jobs.<br><br><b>Statistics from the American labor market indicate a substantial decrease in the number of workers quitting their jobs compared to previous years, highlighting this evolving trend</b>. Data from 2024 shows that 39.6 million Americans resigned from their jobs, an 11% drop from 2023 and a significant 22% decrease compared to 2022. This sharp decline reflects a major shift in employee attitudes, with many individuals choosing to \\\"hug\\\" their current jobs rather than risk changing roles.<br><br>This hesitation to switch roles is primarily driven by shifting economic realities rather than increased corporate loyalty. Tougher economic conditions, including financial instability, widespread layoffs and a general fear of unemployment, have made job security a paramount concern for many. Consequently, the perceived risks associated with seeking new opportunities often outweigh the potential benefits, such as higher salaries or career advancement. Employees are, therefore, prioritizing stability within their existing companies over the uncertainty of the external job market.<br><br>A common characteristic of individuals engaged in 'job hugging' is a heightened <b>aversion</b> to risk- taking in their career decisions. <b>They</b> may continue in roles even when experiencing dissatisfaction, choosing to endure familiar challenges rather than venturing into the unknown. This often involves valuing job security above personal growth or exploring new career paths. For these employees, the fear of a worse outcome in a new environment often compels them to stay put, even when other opportunities might exist. This pattern suggests a strategic decision to minimize exposure to market volatility.<br><br></div><div class=\\\"reading-right\\\"><div class=\\\"mcq-question\\\"><b>Question 23.</b> The word “discrediting” in paragraph 1 is CLOSEST in meaning to ____________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q23\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '23', 'A')\\\"> A. displacing</label><label><input type=\\\"radio\\\" name=\\\"q23\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '23', 'B')\\\"> B. confirming</label><label><input type=\\\"radio\\\" name=\\\"q23\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '23', 'C')\\\"> C. degrading</label><label><input type=\\\"radio\\\" name=\\\"q23\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '23', 'D')\\\"> D. undermining</label></div><div id=\\\"res-5-23\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 24.</b> Which of the following best paraphrases the underlined sentence in paragraph 1?\\n“Statistics from the American labor market indicate a substantial decrease in the number of workers quitting their jobs compared to previous years, highlighting this evolving trend.”<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q24\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '24', 'A')\\\"> A. The American labor market shows that fewer people are leaving their jobs now than before, reflecting a new trend.</label><label><input type=\\\"radio\\\" name=\\\"q24\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '24', 'B')\\\"> B. The evolving trend in the American labor market is a decrease in job hugging due to new statistics recorded over the previous years.</label><label><input type=\\\"radio\\\" name=\\\"q24\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '24', 'C')\\\"> C. In the last couple of years, the number of workers quitting jobs has soared, indicating a new trend in the American labor market.</label><label><input type=\\\"radio\\\" name=\\\"q24\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '24', 'D')\\\"> D. There are more workers deciding to commit to their jobs in the American labor market, changing the employment trend.</label></div><div id=\\\"res-5-24\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 25.</b> Which of the following is NOT mentioned in paragraph 3 as a factor contributing to job hugging?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q25\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '25', 'A')\\\"> A. widespread layoffs</label><label><input type=\\\"radio\\\" name=\\\"q25\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '25', 'B')\\\"> B. fear of unemployment</label><label><input type=\\\"radio\\\" name=\\\"q25\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '25', 'C')\\\"> C. career advancement</label><label><input type=\\\"radio\\\" name=\\\"q25\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '25', 'D')\\\"> D. financial instability</label></div><div id=\\\"res-5-25\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 26.</b> Which of the following is TRUE according to paragraph 3?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q26\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '26', 'A')\\\"> A. Job security is less important than personal growth for job huggers</label><label><input type=\\\"radio\\\" name=\\\"q26\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '26', 'B')\\\"> B. Job huggers often leave their jobs if they are dissatisfied.</label><label><input type=\\\"radio\\\" name=\\\"q26\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '26', 'C')\\\"> C. Job huggers are usually eager to take risks in their careers.</label><label><input type=\\\"radio\\\" name=\\\"q26\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '26', 'D')\\\"> D. Job huggers may stay in roles despite feeling unhappy.</label></div><div id=\\\"res-5-26\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 27.</b> The word “aversion” in paragraph 4 is OPPOSITE in meaning to ____________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q27\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '27', 'A')\\\"> A. commitment</label><label><input type=\\\"radio\\\" name=\\\"q27\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '27', 'B')\\\"> B. preference</label><label><input type=\\\"radio\\\" name=\\\"q27\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '27', 'C')\\\"> C. trend</label><label><input type=\\\"radio\\\" name=\\\"q27\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '27', 'D')\\\"> D. negligence</label></div><div id=\\\"res-5-27\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 28.</b> The word “They” in paragraph 3 refers to ____________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q28\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '28', 'A')\\\"> A. familiar challenges</label><label><input type=\\\"radio\\\" name=\\\"q28\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '28', 'B')\\\"> B. individuals</label><label><input type=\\\"radio\\\" name=\\\"q28\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '28', 'C')\\\"> C. career decisions</label><label><input type=\\\"radio\\\" name=\\\"q28\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '28', 'D')\\\"> D. career paths</label></div><div id=\\\"res-5-28\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 29.</b> Which paragraph provides data to show the increasing trend of “job hugging”?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q29\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '29', 'A')\\\"> A. Paragraph 4</label><label><input type=\\\"radio\\\" name=\\\"q29\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '29', 'B')\\\"> B. Paragraph 1</label><label><input type=\\\"radio\\\" name=\\\"q29\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '29', 'C')\\\"> C. Paragraph 3</label><label><input type=\\\"radio\\\" name=\\\"q29\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '29', 'D')\\\"> D. Paragraph 2</label></div><div id=\\\"res-5-29\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 30.</b> Which paragraph mentions the definition of “job hugging”?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q30\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('5', '30', 'A')\\\"> A. Paragraph 1</label><label><input type=\\\"radio\\\" name=\\\"q30\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('5', '30', 'B')\\\"> B. Paragraph 2</label><label><input type=\\\"radio\\\" name=\\\"q30\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('5', '30', 'C')\\\"> C. Paragraph 3</label><label><input type=\\\"radio\\\" name=\\\"q30\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('5', '30', 'D')\\\"> D. Paragraph 4</label></div><div id=\\\"res-5-30\\\" style=\\\"margin-top:5px\\\"></div></div></div></div></div><div class=\\\"section-box\\\">\\n                    <div class=\\\"section-header\\\">\\n                        <h3 class=\\\"section-title\\\">Part 6: Reading</h3>\\n                        <button class=\\\"fullscreen-btn\\\" onclick=\\\"toggleFullScreenReading(this)\\\">⛶ Full Screen</button>\\n                    </div>\\n                    <div class=\\\"reading-container\\\" id=\\\"reading-6\\\"><div class=\\\"reading-left\\\">The rapid proliferation of artificial intelligence (AI) tools, particularly generative AI, has sparked a profound debate concerning their impact on human cognition. While celebrated for their capacity to enhance productivity and automate complex tasks, a growing body of research suggests that an over- reliance on these technologies might inadvertently blunt our thinking skills. This <b>apprehension</b> echoes historical concerns, such as Socrates's distrust of the written word, which he feared would diminish memory and intellectual rigor. Though the great philosopher's specific fears about writing proved unfounded, the underlying anxiety about new cognitive technologies and their potential to reshape our mental faculties persists in the age of AI.<br><br>Empirical studies are now providing concrete evidence for these contemporary worries. Researchers have observed that even seasoned professionals tend to disengage their critical thinking skills when routinely using generative AI for tasks requiring analysis or synthesis. Furthermore, excessive dependence on AI during learning processes has been linked to reduced brain connectivity and a decrease in the memorability of information. This phenomenon is often attributed to a maladaptive form of \\\"cognitive offloading,\\\" where instead of using AI to free up mental resources for higher-order thinking, individuals delegate fundamental cognitive processes entirely. <b>Such delegation, when unchecked, hinders the development and maintenance of essential mental muscles, potentially transforming our minds into mere passive recipients rather than active processors of information.</b><br><br><b>[I]</b> However, the narrative is not entirely one of decline. Many experts propose that AI, when leveraged judiciously, can serve as a powerful tool for human intelligence. The key lies in shifting from passive consumption to active, critical engagement. <b>[II] </b>Instead of asking AI for complete answers, users can employ it to generate diverse perspectives, identify potential biases, or even challenge their own assumptions. This approach transforms AI from a crutch into a sparring partner, fostering a dynamic interaction that can sharpen reasoning and deepen understanding. <b>[III]</b> Strategies include fact-checking AI outputs, iteratively refining prompts to encourage deeper processing, and dedicating mental effort to understanding why AI provides certain information. The challenge, therefore, is not to reject AI, but to cultivate a mindful approach to its integration into our daily lives and professional practices. <b>[IV]</b><br><br>By understanding the mechanisms of cognitive offloading and consciously designing interactions that promote active learning and critical evaluation, we can harness AI's immense potential without <b>succumbing to its pitfalls</b>. This requires a concerted effort from individuals, educators, and developers to foster \\\"AI literacy\\\" - the ability to effectively and ethically engage with AI technologies. Ultimately, the future impact of AI on human cognition will be less about the technology's inherent nature and more about how we choose to interact with it.<br><br></div><div class=\\\"reading-right\\\"><div class=\\\"mcq-question\\\"><b>Question 31.</b> The author mentions Socrates's historical concerns in paragraph 1 primarily to ____________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q31\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '31', 'A')\\\"> A. highlight the philosophical debate between ancient and modern thinkers</label><label><input type=\\\"radio\\\" name=\\\"q31\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '31', 'B')\\\"> B. prove that historical anxieties about technology are always misplaced</label><label><input type=\\\"radio\\\" name=\\\"q31\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '31', 'C')\\\"> C. suggest that writing, like AI, ultimately harms human memory</label><label><input type=\\\"radio\\\" name=\\\"q31\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '31', 'D')\\\"> D. demonstrate a constant fear surrounding innovative cognitive technologies</label></div><div id=\\\"res-6-31\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 32.</b> Which of the following best summarizes the main idea of paragraph 2?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q32\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '32', 'A')\\\"> A. Experienced professionals are more susceptible to the negative cognitive effects of AI than other people due to the nature of their work.</label><label><input type=\\\"radio\\\" name=\\\"q32\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '32', 'B')\\\"> B. Empirical evidence suggests over-reliance on AI can impair critical thinking and memory due to improper cognitive offloading.</label><label><input type=\\\"radio\\\" name=\\\"q32\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '32', 'C')\\\"> C. It has been argued among researchers whether AI tools are inherently detrimental to brain connectivity and memory formation when used constantly.</label><label><input type=\\\"radio\\\" name=\\\"q32\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '32', 'D')\\\"> D. Cognitive offloading is the use of external tools such as AI to reduce the mental effort needed for a task, thereby lowering cognitive load.</label></div><div id=\\\"res-6-32\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 33.</b> Which of the following is NOT mentioned in the passage as a potential negative consequence of using generative AI excessively?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q33\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '33', 'A')\\\"> A. Reduced brain connectivity.</label><label><input type=\\\"radio\\\" name=\\\"q33\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '33', 'B')\\\"> B. Lowered interpersonal competence.</label><label><input type=\\\"radio\\\" name=\\\"q33\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '33', 'C')\\\"> C. Weakened mental muscles</label><label><input type=\\\"radio\\\" name=\\\"q33\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '33', 'D')\\\"> D. Decreased memorability of information.</label></div><div id=\\\"res-6-33\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 34.</b> The phrase “apprehension” in paragraph 1 most likely means ____________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q34\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '34', 'A')\\\"> A. worry</label><label><input type=\\\"radio\\\" name=\\\"q34\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '34', 'B')\\\"> B. uncertainty</label><label><input type=\\\"radio\\\" name=\\\"q34\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '34', 'C')\\\"> C. adversity</label><label><input type=\\\"radio\\\" name=\\\"q34\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '34', 'D')\\\"> D. argument</label></div><div id=\\\"res-6-34\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 35.</b> The word “their” in paragraph 3 refers to ____________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q35\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '35', 'A')\\\"> A. biases'</label><label><input type=\\\"radio\\\" name=\\\"q35\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '35', 'B')\\\"> B. professionals'</label><label><input type=\\\"radio\\\" name=\\\"q35\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '35', 'C')\\\"> C. users'</label><label><input type=\\\"radio\\\" name=\\\"q35\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '35', 'D')\\\"> D. perspectives'</label></div><div id=\\\"res-6-35\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 36.</b> Which of the following best paraphrases the underlined sentence in paragraph 2?\\n“Such delegation, when unchecked, hinders the development and maintenance of essential mental muscles, potentially transforming our minds into mere passive recipients rather than active processors of information.”<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '36', 'A')\\\"> A. If left unregulated, delegating tasks to AI might prevent us from staying active, causing the brain to lose certain cognitive functions assisting with processing information.</label><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '36', 'B')\\\"> B. The uncontrolled usage of AI for mental tasks will inevitably impede cognitive growth, making individuals less active in processing information.</label><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '36', 'C')\\\"> C. Giving mental tasks to AI, without proper oversight, can weaken cognitive development, leading to a state where minds passively accept information instead of actively engaging with it.</label><label><input type=\\\"radio\\\" name=\\\"q36\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '36', 'D')\\\"> D. The unchecked delegation of mental responsibilities to AI has been reported to lead to a decline in cognitive functions, turning individuals into passive receivers of data.</label></div><div id=\\\"res-6-36\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 37.</b> The phrase “succumbing to its pitfalls” in paragraph 4 is OPPOSITE in meaning to ____________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '37', 'A')\\\"> A. falling into traps</label><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '37', 'B')\\\"> B. overcoming obstacles</label><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '37', 'C')\\\"> C. giving in to hazards</label><label><input type=\\\"radio\\\" name=\\\"q37\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '37', 'D')\\\"> D. yielding to challenges</label></div><div id=\\\"res-6-37\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 38.</b> It can be inferred from the passage that developing ‘AI literacy’ would primarily involve ____________.<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '38', 'A')\\\"> A. focusing solely on the technical aspects of AI development and programming</label><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '38', 'B')\\\"> B. learning to critically evaluate, actively engage with, and ethically use AI technologies</label><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '38', 'C')\\\"> C. passively accepting AI outputs to maximize efficiency and productivity</label><label><input type=\\\"radio\\\" name=\\\"q38\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '38', 'D')\\\"> D. completely avoiding the use of generative AI tools in academic and professional settings</label></div><div id=\\\"res-6-38\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 39.</b> Where in the passage does the following sentence best fit?\\n“This means that users must consciously adopt strategies that encourage active thought rather than simply accepting AI-generated content.”<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '39', 'A')\\\"> A. [III]</label><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"B\\\" onchange=\\\"checkMCQ('6', '39', 'B')\\\"> B. [IV]</label><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"C\\\" onchange=\\\"checkMCQ('6', '39', 'C')\\\"> C. [II]</label><label><input type=\\\"radio\\\" name=\\\"q39\\\" value=\\\"D\\\" onchange=\\\"checkMCQ('6', '39', 'D')\\\"> D. [I]</label></div><div id=\\\"res-6-39\\\" style=\\\"margin-top:5px\\\"></div></div><div class=\\\"mcq-question\\\"><b>Question 40.</b> Which of the following best summarizes the main idea of the passage?<div class=\\\"mcq-options\\\"><label><input type=\\\"radio\\\" name=\\\"q40\\\" value=\\\"A\\\" onchange=\\\"checkMCQ('6', '40', 'A')\\\"> A. Cognitive offloading, a millennial-old strategy, is now being misused with AI, requiring a complete overhaul of educational systems in order to prevent people from over-relying on it.</label><label><input type=\\\"radio
